<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tend</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f7a4d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tend">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" type="image/png" href="icon-512.png">
<style>
  :root{
    --bg:#f4f6f2;--card:#fff;--line:#e2e7db;--ink:#1a2119;--mute:#5f6b5a;--faint:#93a08d;
    --green:#1f7a4d;--green-soft:#e3f2e8;--green-deep:#155f3a;
    --amber:#c9781a;--amber-soft:#fbeeda;--red:#cf3742;--red-soft:#fbe4e5;--gold:#b8860b;
    --shadow:0 1px 2px rgba(20,40,20,.05),0 6px 20px rgba(20,50,25,.06);
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#12160f;--card:#1a1f16;--line:#2b3226;--ink:#eef1e9;--mute:#9aa691;--faint:#5f6b56;
    --green:#43c483;--green-soft:#15291d;--green-deep:#43c483;--amber:#eaa93f;--amber-soft:#2c2211;
    --red:#f2545b;--red-soft:#301518;--gold:#e0b64a;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);}}
  :root[data-theme="light"]{--bg:#f4f6f2;--card:#fff;--line:#e2e7db;--ink:#1a2119;--mute:#5f6b5a;--faint:#93a08d;--green:#1f7a4d;--green-soft:#e3f2e8;--green-deep:#155f3a;--amber:#c9781a;--amber-soft:#fbeeda;--red:#cf3742;--red-soft:#fbe4e5;--gold:#b8860b;--shadow:0 1px 2px rgba(20,40,20,.05),0 6px 20px rgba(20,50,25,.06);}
  :root[data-theme="dark"]{--bg:#12160f;--card:#1a1f16;--line:#2b3226;--ink:#eef1e9;--mute:#9aa691;--faint:#5f6b56;--green:#43c483;--green-soft:#15291d;--green-deep:#43c483;--amber:#eaa93f;--amber-soft:#2c2211;--red:#f2545b;--red-soft:#301518;--gold:#e0b64a;--shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);}

  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:84px}
  .tnum{font-variant-numeric:tabular-nums}
  header{background:var(--green);color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 18px 16px}
  .h-top{display:flex;align-items:center;gap:11px}
  .h-logo{width:34px;height:34px;flex:none}
  header h1{margin:0;font-size:19px;font-weight:800}
  header .day{margin:12px 0 0;font-size:14px;opacity:.92}
  .bar{height:10px;border-radius:99px;background:rgba(255,255,255,.28);margin-top:10px;overflow:hidden}
  .bar>i{display:block;height:100%;background:#fff;border-radius:99px;transition:width .35s ease}
  .bar-lbl{font-size:13px;opacity:.95;margin-top:7px;font-weight:600;display:flex;justify-content:space-between}
  .pay-pill{background:rgba(255,255,255,.22);border-radius:99px;padding:1px 10px;font-weight:800}

  main{max-width:640px;margin:0 auto;padding:16px 14px 20px}
  .grp{margin:20px 2px 9px;font-size:12.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);font-weight:800}
  .grp:first-child{margin-top:8px}
  .task{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden;transition:opacity .2s}
  .task .row{display:flex;gap:13px;padding:13px}
  .thumb{width:74px;height:74px;flex:none;border-radius:12px;background:var(--green-soft);display:grid;place-items:center;font-size:34px;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .t-body{flex:1;min-width:0}
  .t-body h3{margin:0;font-size:16px;line-height:1.25}
  .qty{display:inline-block;background:var(--amber-soft);color:var(--amber);font-weight:800;font-size:12px;border-radius:99px;padding:2px 9px;margin-left:2px}
  .when{display:inline-block;background:var(--green-soft);color:var(--green-deep);font-weight:700;font-size:11px;border-radius:99px;padding:2px 8px;margin-left:6px;text-transform:uppercase;letter-spacing:.04em}
  .pay{display:inline-block;color:var(--gold);font-weight:800;font-size:12px;margin-left:6px}
  .t-body p{margin:6px 0 0;font-size:13.5px;color:var(--mute);white-space:pre-wrap}
  .req{color:var(--red);font-weight:700}
  .actions{display:flex;gap:9px;padding:0 13px 13px}
  .done-btn{flex:1;appearance:none;border:0;border-radius:12px;background:var(--green);color:#fff;font-weight:800;font-size:16px;padding:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .done-btn:active{transform:translateY(1px)}
  .cam-btn{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--mute);border-radius:12px;padding:0 16px;font-size:20px;cursor:pointer}
  .cam-btn.req{border-color:var(--gold);color:var(--gold)}
  .cam-in{display:none}
  .task.done{opacity:.62}
  .task.done .done-btn{background:var(--green-soft);color:var(--green-deep)}
  .stamp{font-size:12px;color:var(--green-deep);font-weight:700;padding:0 13px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .hasphoto{color:var(--gold)}
  .nophoto{color:var(--red)}

  .dad-sum{display:flex;gap:10px;margin-bottom:12px}
  .dcard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;box-shadow:var(--shadow);text-align:center}
  .dcard .n{font-size:22px;font-weight:800}
  .dcard .n.g{color:var(--green)} .dcard .n.r{color:var(--red)} .dcard .n.gold{color:var(--gold)}
  .dcard .l{font-size:11.5px;color:var(--mute);margin-top:3px;font-weight:600}
  .drow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;box-shadow:var(--shadow)}
  .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .dot.ok{background:var(--green)} .dot.no{background:var(--red)} .dot.warn{background:var(--gold)}
  .drow .nm{flex:1;min-width:0;font-weight:600;font-size:14.5px}
  .drow .ts{font-size:12px;color:var(--mute)}
  .ask{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--green-deep);border-radius:99px;font-size:12px;font-weight:700;padding:6px 11px;cursor:pointer;white-space:nowrap}
  .ask.sent{background:var(--green-soft);border-color:transparent}
  .note{background:var(--green-soft);border-radius:12px;padding:13px 15px;font-size:13px;color:var(--green-deep);margin-bottom:14px}

  /* setup */
  .add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;appearance:none;border:1.5px dashed var(--green);background:transparent;color:var(--green-deep);border-radius:14px;padding:14px;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:14px}
  .srow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;box-shadow:var(--shadow)}
  .srow .em{font-size:24px} .srow .nm{flex:1;min-width:0} .srow .nm b{font-size:14.5px} .srow .nm small{display:block;color:var(--mute);font-size:12px}
  .icon-btn{appearance:none;border:0;background:transparent;font-size:18px;cursor:pointer;padding:5px 7px;border-radius:8px;color:var(--mute)}
  .icon-btn:hover{background:var(--bg)}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--card);width:100%;max-width:640px;max-height:92vh;overflow:auto;border-radius:18px 18px 0 0;padding:18px 16px calc(env(safe-area-inset-bottom) + 20px)}
  .sheet h2{margin:2px 0 14px;font-size:19px}
  .fld{margin-bottom:13px} .fld label{display:block;font-size:12.5px;font-weight:700;color:var(--mute);margin-bottom:5px}
  .fld input,.fld textarea,.fld select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit}
  .fld textarea{min-height:74px;resize:vertical}
  .two{display:flex;gap:10px} .two>.fld{flex:1}
  .chk{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--ink)}
  .chk input{width:20px;height:20px}
  .photo-prev{width:100%;height:120px;border-radius:10px;object-fit:cover;margin-top:8px;display:none;border:1px solid var(--line)}
  .sheet-actions{display:flex;gap:10px;margin-top:8px}
  .btn-primary{flex:1;appearance:none;border:0;background:var(--green);color:#fff;border-radius:12px;padding:14px;font-weight:800;font-size:16px;cursor:pointer}
  .btn-ghost{appearance:none;border:1px solid var(--line);background:transparent;color:var(--mute);border-radius:12px;padding:14px 18px;font-weight:700;cursor:pointer}

  .tabbar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);display:flex;padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);z-index:30}
  .tabbar button{flex:1;appearance:none;border:0;background:transparent;color:var(--faint);font-weight:700;font-size:12px;padding:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .tabbar button .ic{font-size:21px}
  .tabbar button[aria-selected="true"]{color:var(--green)}
  [hidden]{display:none!important}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="h-top">
    <svg class="h-logo" viewBox="0 0 40 40" aria-hidden="true">
      <circle cx="20" cy="22" r="11" fill="#fff"/><circle cx="12" cy="11" r="4.4" fill="#fff"/>
      <circle cx="28" cy="11" r="4.4" fill="#fff"/><circle cx="6" cy="20" r="3.8" fill="#fff"/><circle cx="34" cy="20" r="3.8" fill="#fff"/>
    </svg>
    <h1 id="hTitle">Tend</h1>
  </div>
  <p class="day" id="dayLine">Today's chores</p>
  <div class="bar"><i id="barFill" style="width:0%"></i></div>
  <div class="bar-lbl"><span id="barLbl">0 of 0 done</span><span class="pay-pill" id="payPill">$0.00 earned</span></div>
</header>
<main>
  <div id="view-today"></div>
  <div id="view-dad" hidden></div>
  <div id="view-setup" hidden></div>
</main>
<nav class="tabbar" role="tablist">
  <button id="tab-today" role="tab" aria-selected="true" type="button"><span class="ic">✅</span>Today</button>
  <button id="tab-dad" role="tab" aria-selected="false" type="button"><span class="ic">👀</span>Dad's View</button>
  <button id="tab-setup" role="tab" aria-selected="false" type="button"><span class="ic">⚙️</span>Setup</button>
</nav>
<div id="modalHost"></div>

<script>
(function(){
  // ---------- default seed (Leo edits/adds in Setup) ----------
  var SEED=[
    {id:'chick',grp:'Birds',emoji:'🐔',name:'Chickens',when:'AM',qty:'1 coop',pay:2,needsPhoto:true,note:'Fill the feeder — pour slowly so it doesn\'t spill and spoil. Dump the waterer, scrub it, refill with CLEAN water. Collect the eggs.'},
    {id:'ducks',grp:'Birds',emoji:'🦆',name:'Ducks & Geese',when:'AM',qty:'',pay:1.5,needsPhoto:false,note:'Feed them. Dump and refill their water — they dirty it fast.'},
    {id:'guinea',grp:'Birds',emoji:'🐦',name:'Guinea fowl',when:'AM',qty:'',pay:1,needsPhoto:false,note:'Scatter feed. Fresh water.'},
    {id:'beardie',grp:'Reptiles',emoji:'🦎',name:'Bearded dragons',when:'Daily',qty:'',pay:1.5,needsPhoto:false,note:'Feed greens/insects. Mist them. Check the heat lamp is ON.'},
    {id:'iguana',grp:'Reptiles',emoji:'🦖',name:'Iguana',when:'Daily',qty:'',pay:1.5,needsPhoto:false,note:'Fresh greens. Clean water. Mist for humidity.'},
    {id:'fish',grp:'Fish',emoji:'🐠',name:'Tropical fish — CHECK WATER',when:'Daily',qty:'',pay:2,needsPhoto:true,note:'Feed one pinch. Look at the water — if cloudy or sludgy, do a water change. Photo of the CLEAN tank to get paid.'},
    {id:'cat',grp:'Cat',emoji:'🐱',name:'Cat',when:'AM/PM',qty:'',pay:1.5,needsPhoto:false,note:'Feed. Fresh water. Scoop the litter box.'},
    {id:'ponds',grp:'Ponds & Water',emoji:'🪷',name:'Tub ponds — fill by hand',when:'Daily',qty:'',pay:2,needsPhoto:true,note:'Fill them every day, but DO NOT just leave the hose running — the chlorine will kill the fish. Stand there, fill it up, top it off, then done. Photo to get paid.'},
    {id:'fountains',grp:'Ponds & Water',emoji:'⛲',name:'Fountains',when:'Daily',qty:'',pay:1,needsPhoto:false,note:'Fill every day so they don\'t run dry.'},
    {id:'hoses',grp:'Ponds & Water',emoji:'🚰',name:'Hoses OFF',when:'PM',qty:'',pay:0.5,needsPhoto:false,note:'Walk the yard and make sure EVERY hose is turned off before you go in.'},
    {id:'trees',grp:'Plants & Yard',emoji:'🌳',name:'Fruit trees',when:'AM',qty:'all trees',pay:2,needsPhoto:false,note:'Deep-water each tree at the base. Count them so none get skipped.'},
    {id:'plants',grp:'Plants & Yard',emoji:'🪴',name:'Plants',when:'AM',qty:'',pay:1.5,needsPhoto:false,note:'Water the potted plants and the beds.'},
    {id:'grass',grp:'Plants & Yard',emoji:'🌾',name:'Timothy grass',when:'AM',qty:'',pay:1,needsPhoto:false,note:'Water thoroughly.'}
  ];
  var GROUPS=['Birds','Reptiles','Fish','Cat','Ponds & Water','Plants & Yard','Other'];
  var EMOJIS=['🐔','🦆','🐦','🦎','🦖','🐠','🐱','🐶','🐐','🐰','🪷','⛲','🚰','🌳','🪴','🌾','🌸','🐢','🐝','🦜'];

  function loadTasks(){ try{var t=JSON.parse(localStorage.getItem('cc-tasks'));if(Array.isArray(t)&&t.length)return t;}catch(e){} return SEED.slice(); }
  function saveTasks(){ localStorage.setItem('cc-tasks',JSON.stringify(TASKS)); }
  var TASKS=loadTasks();

  function todayKey(){ return 'cc-day-'+new Date().toDateString(); }
  var state=JSON.parse(localStorage.getItem(todayKey())||'{}');
  var asks=JSON.parse(localStorage.getItem('cc-asks')||'{}');
  function saveState(){ localStorage.setItem(todayKey(),JSON.stringify(state)); }
  function fmtTime(iso){var d=new Date(iso),h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+(m<10?'0':'')+m+' '+ap;}
  function money(n){return '$'+(Math.round(n*100)/100).toFixed(2);}
  function esc(t){return (t==null?'':String(t)).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
  function earnedFor(t){var st=state[t.id];if(!st||!st.done)return 0;if(t.needsPhoto&&!st.photo)return 0;return +t.pay||0;}

  // ---------- Today ----------
  function renderToday(){
    var el=document.getElementById('view-today'),html='',last='';
    TASKS.forEach(function(t){
      if(t.grp!==last){html+='<div class="grp">'+esc(t.grp)+'</div>';last=t.grp;}
      var st=state[t.id],done=st&&st.done;
      html+='<div class="task'+(done?' done':'')+'"><div class="row"><div class="thumb">'+(st&&st.photo?'<img src="'+st.photo+'">':(t.photo?'<img src="'+t.photo+'">':esc(t.emoji)))+'</div>'+
        '<div class="t-body"><h3>'+esc(t.name)+(t.qty?' <span class="qty">'+esc(t.qty)+'</span>':'')+(t.when?'<span class="when">'+esc(t.when)+'</span>':'')+(t.pay?'<span class="pay">'+money(t.pay)+'</span>':'')+'</h3>'+
        '<p>'+esc(t.note)+(t.needsPhoto?' <span class="req">(photo to get paid)</span>':'')+'</p></div></div>';
      if(done){
        var paid=earnedFor(t);
        html+='<div class="stamp">✓ Done '+fmtTime(st.at)+(st.photo?' <span class="hasphoto">· 📷 +'+money(t.pay)+'</span>':(t.needsPhoto?' <span class="nophoto">· no photo — '+money(t.pay)+' not earned</span>':''))+'</div>';
      } else {
        html+='<div class="actions"><button class="done-btn" data-act="done" data-id="'+t.id+'">Mark Done</button>'+
          '<button class="cam-btn'+(t.needsPhoto?' req':'')+'" data-act="cam" data-id="'+t.id+'">📷</button>'+
          '<input class="cam-in" type="file" accept="image/*" capture="environment" data-for="'+t.id+'"></div>';
      }
      html+='</div>';
    });
    el.innerHTML=html; updateBar();
  }
  function updateBar(){
    var done=TASKS.filter(function(t){return state[t.id]&&state[t.id].done;}).length;
    var pct=TASKS.length?Math.round(done/TASKS.length*100):0;
    document.getElementById('barFill').style.width=pct+'%';
    document.getElementById('barLbl').textContent=done+' of '+TASKS.length+' done';
    var earned=TASKS.reduce(function(s,t){return s+earnedFor(t);},0);
    document.getElementById('payPill').textContent=money(earned)+' earned';
    document.getElementById('dayLine').textContent=new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})+" — today's chores";
  }
  document.getElementById('view-today').addEventListener('click',function(e){
    var b=e.target.closest('[data-act]');if(!b)return;var id=b.getAttribute('data-id');var t=TASKS.find(function(x){return x.id===id;});
    if(b.getAttribute('data-act')==='cam'){b.parentNode.querySelector('.cam-in[data-for="'+id+'"]').click();return;}
    state[id]=Object.assign({},state[id],{done:true,at:new Date().toISOString()});saveState();renderToday();
  });
  document.getElementById('view-today').addEventListener('change',function(e){
    var inp=e.target.closest('.cam-in');if(!inp||!inp.files||!inp.files[0])return;var id=inp.getAttribute('data-for');var fr=new FileReader();
    fr.onload=function(){state[id]=Object.assign({},state[id],{photo:fr.result});saveState();renderToday();};fr.readAsDataURL(inp.files[0]);
  });

  // ---------- Dad's View ----------
  function renderDad(){
    var el=document.getElementById('view-dad');
    var done=TASKS.filter(function(t){return state[t.id]&&state[t.id].done;});
    var missing=TASKS.filter(function(t){return !(state[t.id]&&state[t.id].done);});
    var earned=TASKS.reduce(function(s,t){return s+earnedFor(t);},0);
    var possible=TASKS.reduce(function(s,t){return s+(+t.pay||0);},0);
    var lost=possible-earned;
    var html='<div class="note">Your view from the road. What got done, when, and what it cost him if he skipped it or didn\'t send a photo.</div>';
    html+='<div class="dad-sum"><div class="dcard"><div class="n g">'+done.length+'/'+TASKS.length+'</div><div class="l">Done</div></div>'+
      '<div class="dcard"><div class="n gold">'+money(earned)+'</div><div class="l">Earned</div></div>'+
      '<div class="dcard"><div class="n r">'+money(lost)+'</div><div class="l">Lost</div></div></div>';
    if(missing.length){html+='<div class="grp">Not done ('+missing.length+')</div>';
      missing.forEach(function(t){html+='<div class="drow"><span class="dot no"></span><span class="nm">'+esc(t.emoji)+' '+esc(t.name)+'</span>'+
        '<span class="ts">-'+money(t.pay)+'</span><button class="ask'+(asks[t.id]?' sent':'')+'" data-ask="'+t.id+'">'+(asks[t.id]?'Asked ✓':'Ask')+'</button></div>';});}
    html+='<div class="grp">Done ('+done.length+')</div>';
    done.forEach(function(t){var st=state[t.id];var noPay=t.needsPhoto&&!st.photo;
      html+='<div class="drow"><span class="dot '+(noPay?'warn':'ok')+'"></span><span class="nm">'+esc(t.emoji)+' '+esc(t.name)+(st.photo?' 📷':(t.needsPhoto?' <span style="color:var(--red)">(no photo)</span>':''))+'</span><span class="ts">'+fmtTime(st.at)+'</span>'+
        '<button class="ask'+(asks[t.id]?' sent':'')+'" data-ask="'+t.id+'">'+(asks[t.id]?'Asked ✓':'Ask')+'</button></div>';});
    html+='<button class="btn-ghost" id="resetBtn" style="width:100%;margin-top:14px">Start a new day (clear today)</button>';
    el.innerHTML=html;
  }
  document.getElementById('view-dad').addEventListener('click',function(e){
    var a=e.target.closest('[data-ask]');
    if(a){var id=a.getAttribute('data-ask');asks[id]=true;localStorage.setItem('cc-asks',JSON.stringify(asks));renderDad();alert('Sent — a "Dad wants a photo" flag shows on that task. (Demo: this is where the real notification goes to their phone.)');return;}
    if(e.target.id==='resetBtn'){if(confirm('Clear today and start fresh?')){state={};asks={};saveState();localStorage.setItem('cc-asks','{}');renderToday();renderDad();}}
  });

  // ---------- Setup ----------
  function renderSetup(){
    var el=document.getElementById('view-setup');
    var html='<div class="note">This is where YOU build the list. Add each thing, write EXACTLY how to do it, snap a photo, set how much it pays. Only you know the particular way — put it here once.</div>';
    html+='<button class="add-btn" id="addTask">＋ Add a task</button>';
    var last='';
    TASKS.forEach(function(t,i){
      if(t.grp!==last){html+='<div class="grp">'+esc(t.grp)+'</div>';last=t.grp;}
      html+='<div class="srow"><span class="em">'+(t.photo?'<img src="'+t.photo+'" style="width:34px;height:34px;border-radius:8px;object-fit:cover">':esc(t.emoji))+'</span>'+
        '<span class="nm"><b>'+esc(t.name)+'</b><small>'+esc(t.when||'')+(t.pay?' · '+money(t.pay):'')+(t.needsPhoto?' · 📷 for pay':'')+'</small></span>'+
        '<button class="icon-btn" data-edit="'+t.id+'">✏️</button><button class="icon-btn" data-del="'+t.id+'">🗑️</button></div>';
    });
    el.innerHTML=html;
  }
  document.getElementById('view-setup').addEventListener('click',function(e){
    if(e.target.id==='addTask'){openEditor(null);return;}
    var ed=e.target.closest('[data-edit]');if(ed){openEditor(ed.getAttribute('data-edit'));return;}
    var del=e.target.closest('[data-del]');if(del){var id=del.getAttribute('data-del');var t=TASKS.find(function(x){return x.id===id;});
      if(confirm('Delete "'+t.name+'"?')){TASKS=TASKS.filter(function(x){return x.id!==id;});saveTasks();renderSetup();renderToday();}}
  });

  function openEditor(id){
    var t=id?TASKS.find(function(x){return x.id===id;}):{grp:'Birds',emoji:'🐔',when:'AM',pay:1,needsPhoto:false};
    var host=document.getElementById('modalHost');
    host.innerHTML='<div class="modal" id="modal"><div class="sheet">'+
      '<h2>'+(id?'Edit task':'New task')+'</h2>'+
      '<div class="fld"><label>Name</label><input id="f-name" value="'+esc(t.name||'')+'" placeholder="e.g. Tub ponds"></div>'+
      '<div class="two"><div class="fld"><label>Group</label><select id="f-grp">'+GROUPS.map(function(g){return '<option'+(g===t.grp?' selected':'')+'>'+g+'</option>';}).join('')+'</select></div>'+
      '<div class="fld"><label>When</label><input id="f-when" value="'+esc(t.when||'')+'" placeholder="AM / PM / Daily"></div></div>'+
      '<div class="two"><div class="fld"><label>Icon</label><select id="f-emoji">'+EMOJIS.map(function(m){return '<option'+(m===t.emoji?' selected':'')+'>'+m+'</option>';}).join('')+'</select></div>'+
      '<div class="fld"><label>How many (optional)</label><input id="f-qty" value="'+esc(t.qty||'')+'" placeholder="6 trees"></div></div>'+
      '<div class="fld"><label>Exactly how to do it</label><textarea id="f-note" placeholder="The particular way — every step, and WHY (e.g. don\'t leave the hose, chlorine kills the fish)">'+esc(t.note||'')+'</textarea></div>'+
      '<div class="two"><div class="fld"><label>Pays ($)</label><input id="f-pay" type="number" step="0.25" value="'+(t.pay!=null?t.pay:'')+'" placeholder="2.00"></div>'+
      '<div class="fld"><label>Photo</label><input id="f-photo" type="file" accept="image/*"></div></div>'+
      '<img id="f-prev" class="photo-prev"'+(t.photo?' src="'+t.photo+'" style="display:block"':'')+'>'+
      '<label class="chk" style="margin:6px 0 16px"><input type="checkbox" id="f-needs"'+(t.needsPhoto?' checked':'')+'> Photo required to get paid</label>'+
      '<div class="sheet-actions"><button class="btn-ghost" id="cancelBtn">Cancel</button><button class="btn-primary" id="saveBtn">Save</button></div>'+
      '</div></div>';
    var photoData=t.photo||'';
    document.getElementById('f-photo').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var fr=new FileReader();fr.onload=function(){photoData=fr.result;var p=document.getElementById('f-prev');p.src=photoData;p.style.display='block';};fr.readAsDataURL(f);});
    document.getElementById('cancelBtn').onclick=function(){host.innerHTML='';};
    document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')host.innerHTML='';});
    document.getElementById('saveBtn').onclick=function(){
      var name=document.getElementById('f-name').value.trim();if(!name){alert('Give it a name.');return;}
      var obj={id:id||('t'+Date.now()),grp:document.getElementById('f-grp').value,when:document.getElementById('f-when').value.trim(),
        emoji:document.getElementById('f-emoji').value,qty:document.getElementById('f-qty').value.trim(),name:name,
        note:document.getElementById('f-note').value.trim(),pay:parseFloat(document.getElementById('f-pay').value)||0,
        needsPhoto:document.getElementById('f-needs').checked,photo:photoData};
      if(id){var i=TASKS.findIndex(function(x){return x.id===id;});TASKS[i]=obj;}else{TASKS.push(obj);}
      // keep grouped order
      TASKS.sort(function(a,b){return GROUPS.indexOf(a.grp)-GROUPS.indexOf(b.grp);});
      saveTasks();host.innerHTML='';renderSetup();renderToday();
    };
  }

  // ---------- tabs ----------
  var tabs={'tab-today':['view-today',renderToday],'tab-dad':['view-dad',renderDad],'tab-setup':['view-setup',renderSetup]};
  Object.keys(tabs).forEach(function(tid){document.getElementById(tid).addEventListener('click',function(){
    Object.keys(tabs).forEach(function(k){document.getElementById(k).setAttribute('aria-selected',k===tid?'true':'false');document.getElementById(tabs[k][0]).hidden=(k!==tid);});
    tabs[tid][1]();document.querySelector('header').scrollIntoView({block:'start'});
  });});
  renderToday();
})();
</script>
</body>
</html>
