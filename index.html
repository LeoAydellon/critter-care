<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tend</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f7a4d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tend">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" type="image/png" href="icon-512.png">
<style>
  :root{
    --bg:#f4f6f2;--card:#fff;--line:#e2e7db;--ink:#1a2119;--mute:#5f6b5a;--faint:#93a08d;
    --green:#1f7a4d;--green-soft:#e3f2e8;--green-deep:#155f3a;
    --amber:#c9781a;--amber-soft:#fbeeda;--red:#cf3742;--red-soft:#fbe4e5;--gold:#b8860b;
    --shadow:0 1px 2px rgba(20,40,20,.05),0 6px 20px rgba(20,50,25,.06);
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#12160f;--card:#1a1f16;--line:#2b3226;--ink:#eef1e9;--mute:#9aa691;--faint:#5f6b56;
    --green:#43c483;--green-soft:#15291d;--green-deep:#43c483;--amber:#eaa93f;--amber-soft:#2c2211;
    --red:#f2545b;--red-soft:#301518;--gold:#e0b64a;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);}}
  :root[data-theme="light"]{--bg:#f4f6f2;--card:#fff;--line:#e2e7db;--ink:#1a2119;--mute:#5f6b5a;--faint:#93a08d;--green:#1f7a4d;--green-soft:#e3f2e8;--green-deep:#155f3a;--amber:#c9781a;--amber-soft:#fbeeda;--red:#cf3742;--red-soft:#fbe4e5;--gold:#b8860b;--shadow:0 1px 2px rgba(20,40,20,.05),0 6px 20px rgba(20,50,25,.06);}
  :root[data-theme="dark"]{--bg:#12160f;--card:#1a1f16;--line:#2b3226;--ink:#eef1e9;--mute:#9aa691;--faint:#5f6b56;--green:#43c483;--green-soft:#15291d;--green-deep:#43c483;--amber:#eaa93f;--amber-soft:#2c2211;--red:#f2545b;--red-soft:#301518;--gold:#e0b64a;--shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);}

  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:84px}
  .tnum{font-variant-numeric:tabular-nums}
  header{background:var(--green);color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 18px 16px}
  .h-top{display:flex;align-items:center;gap:11px}
  .h-logo{width:34px;height:34px;flex:none}
  header h1{margin:0;font-size:19px;font-weight:800}
  header .day{margin:12px 0 0;font-size:14px;opacity:.92}
  .bar{height:10px;border-radius:99px;background:rgba(255,255,255,.28);margin-top:10px;overflow:hidden}
  .bar>i{display:block;height:100%;background:#fff;border-radius:99px;transition:width .35s ease}
  .bar-lbl{font-size:13px;opacity:.95;margin-top:7px;font-weight:600;display:flex;justify-content:space-between}
  .pay-pill{background:rgba(255,255,255,.22);border-radius:99px;padding:1px 10px;font-weight:800}

  main{max-width:640px;margin:0 auto;padding:16px 14px 20px}

  /* module section header (Today) */
  .mod-head{display:flex;align-items:center;gap:11px;margin:22px 2px 10px}
  .mod-head:first-child{margin-top:6px}
  .mod-em{width:42px;height:42px;flex:none;border-radius:12px;background:var(--green-soft);display:grid;place-items:center;font-size:23px;overflow:hidden}
  .mod-em img{width:100%;height:100%;object-fit:cover}
  .mod-name{flex:1;min-width:0}
  .mod-name b{font-size:17px;font-weight:800;display:block;line-height:1.2}
  .mod-name .when{display:inline-block;background:var(--green-soft);color:var(--green-deep);font-weight:700;font-size:10.5px;border-radius:99px;padding:1px 8px;margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
  .mod-prog{font-size:12.5px;font-weight:800;color:var(--faint);white-space:nowrap}
  .mod-prog.all{color:var(--green)}
  .grp{margin:20px 2px 9px;font-size:12.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);font-weight:800}

  .task{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin:0 0 10px 12px;overflow:hidden;transition:opacity .2s}
  .task .row{display:flex;gap:13px;padding:13px}
  .thumb{width:66px;height:66px;flex:none;border-radius:12px;background:var(--green-soft);display:grid;place-items:center;font-size:26px;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .t-body{flex:1;min-width:0}
  .t-body h3{margin:0;font-size:15.5px;line-height:1.25}
  .pay{display:inline-block;color:var(--gold);font-weight:800;font-size:12px;margin-left:6px}
  .t-body p{margin:6px 0 0;font-size:13.5px;color:var(--mute);white-space:pre-wrap}
  .req{color:var(--red);font-weight:700}
  .actions{display:flex;gap:9px;padding:0 13px 13px}
  .done-btn{flex:1;appearance:none;border:0;border-radius:12px;background:var(--green);color:#fff;font-weight:800;font-size:16px;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .done-btn:active{transform:translateY(1px)}
  .cam-btn{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--mute);border-radius:12px;padding:0 16px;font-size:20px;cursor:pointer}
  .cam-btn.req{border-color:var(--gold);color:var(--gold)}
  .cam-in{display:none}
  .task.done{opacity:.62}
  .task.done .done-btn{background:var(--green-soft);color:var(--green-deep)}
  .stamp{font-size:12px;color:var(--green-deep);font-weight:700;padding:0 13px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .hasphoto{color:var(--gold)}
  .nophoto{color:var(--red)}
  .t-strip{display:flex;gap:6px;margin-top:9px;overflow-x:auto}
  .t-strip img{width:52px;height:52px;border-radius:8px;object-fit:cover;flex:none;border:1px solid var(--line)}
  .refs-label{font-size:11px;font-weight:800;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 6px}
  .ref-gallery{display:flex;gap:7px;flex-wrap:wrap}
  .ref-gallery img{width:78px;height:78px;border-radius:10px;object-fit:cover;border:1px solid var(--line);cursor:zoom-in}
  .thumb img.zoom{cursor:zoom-in}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:80;display:flex;align-items:center;justify-content:center;padding:14px}
  .lightbox img{max-width:100%;max-height:100%;border-radius:10px}
  .lightbox .x{position:fixed;top:calc(env(safe-area-inset-top) + 12px);right:16px;width:40px;height:40px;border-radius:50%;border:0;background:rgba(255,255,255,.18);color:#fff;font-size:22px;cursor:pointer}
  .mod-empty{margin:0 0 10px 12px;font-size:13px;color:var(--faint);font-style:italic;padding:4px 2px}

  .dad-sum{display:flex;gap:10px;margin-bottom:12px}
  .dcard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;box-shadow:var(--shadow);text-align:center}
  .dcard .n{font-size:22px;font-weight:800}
  .dcard .n.g{color:var(--green)} .dcard .n.r{color:var(--red)} .dcard .n.gold{color:var(--gold)}
  .dcard .l{font-size:11.5px;color:var(--mute);margin-top:3px;font-weight:600}
  .drow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;box-shadow:var(--shadow)}
  .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .dot.ok{background:var(--green)} .dot.no{background:var(--red)} .dot.warn{background:var(--gold)}
  .drow .nm{flex:1;min-width:0;font-weight:600;font-size:14px}
  .drow .nm .mod{color:var(--faint);font-weight:700;font-size:12px}
  .drow .ts{font-size:12px;color:var(--mute)}
  .ask{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--green-deep);border-radius:99px;font-size:12px;font-weight:700;padding:6px 11px;cursor:pointer;white-space:nowrap}
  .ask.sent{background:var(--green-soft);border-color:transparent}
  .note{background:var(--green-soft);border-radius:12px;padding:13px 15px;font-size:13px;color:var(--green-deep);margin-bottom:14px}

  /* setup */
  .add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;appearance:none;border:1.5px dashed var(--green);background:transparent;color:var(--green-deep);border-radius:14px;padding:14px;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:14px}
  .mod-block{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:13px;overflow:hidden}
  .mod-block-head{display:flex;align-items:center;gap:11px;padding:12px 13px;background:var(--green-soft)}
  .mod-block-head .em{font-size:22px;width:32px;height:32px;display:grid;place-items:center;border-radius:8px;overflow:hidden}
  .mod-block-head .em img{width:32px;height:32px;object-fit:cover;border-radius:8px}
  .mod-block-head .nm{flex:1;min-width:0}
  .mod-block-head .nm b{font-size:15.5px;color:var(--green-deep)}
  .mod-block-head .nm small{display:block;color:var(--mute);font-size:12px}
  .srow{display:flex;align-items:center;gap:10px;padding:10px 13px;border-top:1px solid var(--line)}
  .srow .em{font-size:16px;width:30px;height:30px;flex:none;display:grid;place-items:center;border-radius:7px;overflow:hidden;background:var(--bg)}
  .srow .em img{width:30px;height:30px;object-fit:cover;border-radius:7px}
  .srow .nm{flex:1;min-width:0} .srow .nm b{font-size:14px} .srow .nm small{display:block;color:var(--mute);font-size:11.5px}
  .sub-add{display:flex;align-items:center;gap:7px;width:100%;appearance:none;border:0;border-top:1px dashed var(--line);background:transparent;color:var(--green-deep);padding:11px;font-weight:700;font-size:13.5px;cursor:pointer}
  .icon-btn{appearance:none;border:0;background:transparent;font-size:17px;cursor:pointer;padding:5px 6px;border-radius:8px;color:var(--mute)}
  .icon-btn:hover{background:var(--bg)}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--card);width:100%;max-width:640px;max-height:92vh;overflow:auto;border-radius:18px 18px 0 0;padding:18px 16px calc(env(safe-area-inset-bottom) + 20px)}
  .sheet h2{margin:2px 0 4px;font-size:19px}
  .sheet .sub{margin:0 0 14px;color:var(--mute);font-size:13px}
  .fld{margin-bottom:13px} .fld label{display:block;font-size:12.5px;font-weight:700;color:var(--mute);margin-bottom:5px}
  .fld input,.fld textarea,.fld select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit}
  .fld textarea{min-height:74px;resize:vertical}
  .two{display:flex;gap:10px} .two>.fld{flex:1}
  .chk{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--ink)}
  .chk input{width:20px;height:20px}
  .photo-strip{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px}
  .pthumb{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
  .pthumb img{width:100%;height:100%;object-fit:cover}
  .pthumb button{position:absolute;top:2px;right:2px;width:22px;height:22px;border-radius:50%;border:0;background:rgba(0,0,0,.6);color:#fff;font-size:15px;line-height:1;cursor:pointer;padding:0}
  .sheet-actions{display:flex;gap:10px;margin-top:8px}
  .btn-primary{flex:1;appearance:none;border:0;background:var(--green);color:#fff;border-radius:12px;padding:14px;font-weight:800;font-size:16px;cursor:pointer}
  .btn-ghost{appearance:none;border:1px solid var(--line);background:transparent;color:var(--mute);border-radius:12px;padding:14px 18px;font-weight:700;cursor:pointer}
  .btn-danger{appearance:none;border:1px solid var(--red);background:transparent;color:var(--red);border-radius:12px;padding:14px 18px;font-weight:700;cursor:pointer}
  .photo-btns{display:flex;gap:9px}
  .pbtn{flex:1;appearance:none;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:10px;padding:11px;font-weight:700;font-size:14px;cursor:pointer}
  .pbtn:active{transform:translateY(1px)}

  .tabbar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);display:flex;padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);z-index:30}
  .tabbar button{flex:1;appearance:none;border:0;background:transparent;color:var(--faint);font-weight:700;font-size:12px;padding:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .tabbar button .ic{font-size:21px}
  .tabbar button[aria-selected="true"]{color:var(--green)}
  [hidden]{display:none!important}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="h-top">
    <svg class="h-logo" viewBox="0 0 40 40" aria-hidden="true">
      <circle cx="20" cy="22" r="11" fill="#fff"/><circle cx="12" cy="11" r="4.4" fill="#fff"/>
      <circle cx="28" cy="11" r="4.4" fill="#fff"/><circle cx="6" cy="20" r="3.8" fill="#fff"/><circle cx="34" cy="20" r="3.8" fill="#fff"/>
    </svg>
    <h1 id="hTitle">Tend</h1>
  </div>
  <p class="day" id="dayLine">Today's chores</p>
  <div class="bar"><i id="barFill" style="width:0%"></i></div>
  <div class="bar-lbl"><span id="barLbl">0 of 0 done</span><span class="pay-pill" id="payPill">$0.00 earned</span></div>
</header>
<main>
  <div id="view-today"></div>
  <div id="view-dad" hidden></div>
  <div id="view-setup" hidden></div>
</main>
<nav class="tabbar" role="tablist">
  <button id="tab-today" role="tab" aria-selected="true" type="button"><span class="ic">✅</span>Today</button>
  <button id="tab-dad" role="tab" aria-selected="false" type="button"><span class="ic">👀</span>Dad's View</button>
  <button id="tab-setup" role="tab" aria-selected="false" type="button"><span class="ic">⚙️</span>Setup</button>
</nav>
<div id="modalHost"></div>

<script>
(function(){
  // ================= data model =================
  // A MODULE is a renamable area ("Chicken Yard"). Each module holds MANY
  // sub-tasks. Each sub-task has its own instruction, its own photo(s), and
  // its own checkmark + pay. Leo builds/renames all of it in Setup.
  var SEED=[
    {id:'m-chick',name:'Chicken Yard',emoji:'🐔',when:'AM',subs:[
      {id:'ck1',name:'Feed',note:'Fill the feeder — pour slowly so it doesn\'t spill and spoil.',pay:1,needsPhoto:false,photos:[]},
      {id:'ck2',name:'Fresh water',note:'Dump the waterer, scrub it, refill with CLEAN water.',pay:1,needsPhoto:false,photos:[]},
      {id:'ck3',name:'Collect eggs',note:'Check every nesting box and bring the eggs inside.',pay:1,needsPhoto:true,photos:[]}
    ]},
    {id:'m-ducks',name:'Ducks & Geese',emoji:'🦆',when:'AM',subs:[
      {id:'dk1',name:'Feed & water',note:'Feed them. Dump and refill their water — they dirty it fast.',pay:1.5,needsPhoto:false,photos:[]}
    ]},
    {id:'m-guinea',name:'Guinea Fowl',emoji:'🐦',when:'AM',subs:[
      {id:'gn1',name:'Feed & water',note:'Scatter feed. Fresh water.',pay:1,needsPhoto:false,photos:[]}
    ]},
    {id:'m-poults',name:'Poults (Turkeys)',emoji:'🦃',when:'Daily',subs:[
      {id:'tk1',name:'Check the food',note:'Look at the feeder — top it off if it\'s low. Photo of where the food is / what the bowls look like.',pay:1,needsPhoto:true,photos:[]},
      {id:'tk2',name:'Fresh water',note:'Fresh, clean water every single day. Dump the old, refill.',pay:1,needsPhoto:true,photos:[]},
      {id:'tk3',name:'Count & observe (all 4)',note:'Count them — there should be FOUR. Watch them a minute: are they all up, healthy, friendly, acting normal? If one is off or missing, tell Dad.',pay:1.5,needsPhoto:true,photos:[]}
    ]},
    {id:'m-beardie',name:'Bearded Dragons',emoji:'🦎',when:'Daily',subs:[
      {id:'bd1',name:'Feed',note:'Feed greens and insects.',pay:1,needsPhoto:false,photos:[]},
      {id:'bd2',name:'Mist & heat check',note:'Mist them. Check the heat lamp is ON.',pay:0.5,needsPhoto:false,photos:[]}
    ]},
    {id:'m-iguana',name:'Iguana',emoji:'🦖',when:'Daily',subs:[
      {id:'ig1',name:'Greens & water',note:'Fresh greens. Clean water.',pay:1,needsPhoto:false,photos:[]},
      {id:'ig2',name:'Mist',note:'Mist for humidity.',pay:0.5,needsPhoto:false,photos:[]}
    ]},
    {id:'m-fish',name:'Fish Tank',emoji:'🐠',when:'Daily',subs:[
      {id:'fs1',name:'Feed',note:'One pinch of food — no more.',pay:1,needsPhoto:false,photos:[]},
      {id:'fs2',name:'Check the water',note:'Look at the water — if cloudy or sludgy, do a water change. Photo of the CLEAN tank to get paid.',pay:2,needsPhoto:true,photos:[]}
    ]},
    {id:'m-cat',name:'Cat',emoji:'🐱',when:'AM/PM',subs:[
      {id:'ct1',name:'Feed & water',note:'Feed. Fresh water.',pay:1,needsPhoto:false,photos:[]},
      {id:'ct2',name:'Litter box',note:'Scoop the litter box.',pay:1,needsPhoto:false,photos:[]}
    ]},
    {id:'m-ponds',name:'Tub Ponds',emoji:'🪷',when:'Daily',subs:[
      {id:'pd1',name:'Fill by hand',note:'Fill every day, but DO NOT leave the hose running — the chlorine will kill the fish. Stand there, fill it, top it off, done. Photo to get paid.',pay:2,needsPhoto:true,photos:[]}
    ]},
    {id:'m-fountains',name:'Fountains',emoji:'⛲',when:'Daily',subs:[
      {id:'ft1',name:'Fill',note:'Fill every day so they don\'t run dry.',pay:1,needsPhoto:false,photos:[]}
    ]},
    {id:'m-water',name:'Yard Water-Off',emoji:'🚰',when:'PM',subs:[
      {id:'ho1',name:'All hoses OFF',note:'Walk the yard and make sure EVERY hose is turned off before you go in.',pay:0.5,needsPhoto:false,photos:[]}
    ]},
    {id:'m-trees',name:'Fruit Trees',emoji:'🌳',when:'AM',subs:[
      {id:'tr1',name:'Deep water',note:'Deep-water each tree at the base. Count them so none get skipped.',pay:2,needsPhoto:false,photos:[]}
    ]},
    {id:'m-plants',name:'Plants & Grass',emoji:'🪴',when:'AM',subs:[
      {id:'pl1',name:'Water pots & beds',note:'Water the potted plants and the beds.',pay:1,needsPhoto:false,photos:[]},
      {id:'pl2',name:'Timothy grass',note:'Water thoroughly.',pay:1,needsPhoto:false,photos:[]}
    ]}
  ];
  var EMOJIS=['🐔','🦆','🐦','🦎','🦖','🐠','🐱','🐶','🐐','🐰','🐴','🐷','🪷','⛲','🚰','🌳','🪴','🌾','🌸','🐢','🐝','🦜','🌿','🥕'];

  // ---------- storage (v2 = modules) with migration from old flat list ----------
  var LS_KEY='tend-modules-v2';
  function migrateFlat(){
    try{
      var old=JSON.parse(localStorage.getItem('cc-tasks'));
      if(!Array.isArray(old)||!old.length) return null;
      var byGrp={}, order=[];
      old.forEach(function(t){
        var g=t.grp||'Chores';
        if(!byGrp[g]){byGrp[g]={id:'m-'+(t.id||Math.random()).toString(36).slice(0,6),name:g,emoji:t.emoji||'🐾',when:t.when||'',subs:[]};order.push(g);}
        byGrp[g].subs.push({id:(t.id||('s'+order.length+'-'+byGrp[g].subs.length)),name:t.name||'Task',note:t.note||'',
          pay:+t.pay||0,needsPhoto:!!t.needsPhoto,photos:(t.photos&&t.photos.slice())||(t.photo?[t.photo]:[])});
      });
      return order.map(function(g){return byGrp[g];});
    }catch(e){ return null; }
  }
  function loadModules(){
    try{var m=JSON.parse(localStorage.getItem(LS_KEY));if(Array.isArray(m)&&m.length)return m;}catch(e){}
    var mig=migrateFlat(); if(mig) return mig;
    return JSON.parse(JSON.stringify(SEED));
  }
  function saveModules(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(MODULES)); return true; }
    catch(e){ alert('Couldn\'t save — the phone storage is full. Try removing a photo, or use fewer/smaller photos.'); return false; } }
  var MODULES=loadModules();

  function todayKey(){ return 'cc-day-'+new Date().toDateString(); }
  var state=JSON.parse(localStorage.getItem(todayKey())||'{}');
  var asks=JSON.parse(localStorage.getItem('cc-asks')||'{}');
  function saveState(){ try{ localStorage.setItem(todayKey(),JSON.stringify(state)); }catch(e){ alert('Couldn\'t save — the phone storage is full. Try a smaller photo.'); } }

  function fmtTime(iso){var d=new Date(iso),h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+(m<10?'0':'')+m+' '+ap;}
  function money(n){return '$'+(Math.round(n*100)/100).toFixed(2);}
  function esc(t){return (t==null?'':String(t)).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
  function openLightbox(src){ if(!src)return; var h=document.getElementById('modalHost');
    h.innerHTML='<div class="lightbox" id="lightbox"><button class="x" type="button">×</button><img src="'+src+'"></div>';
    document.getElementById('lightbox').addEventListener('click',function(){h.innerHTML='';}); }

  // shrink phone photos before storing (full-size base64 blows past localStorage's ~5MB cap)
  function resizeImage(file, cb){
    var fr=new FileReader();
    fr.onload=function(){
      var img=new Image();
      img.onload=function(){
        var max=1000, w=img.width, h=img.height;
        if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
        try{ var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.7)); }
        catch(e){ cb(fr.result); }
      };
      img.onerror=function(){ cb(fr.result); };
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  }

  // ---------- helpers over the 2-level model ----------
  function allSubs(){ var out=[]; MODULES.forEach(function(m){m.subs.forEach(function(s){out.push({s:s,m:m});});}); return out; }
  function findSub(id){ for(var i=0;i<MODULES.length;i++){var m=MODULES[i];for(var j=0;j<m.subs.length;j++){if(m.subs[j].id===id)return {s:m.subs[j],m:m};}} return null; }
  function earnedFor(s){var st=state[s.id];if(!st||!st.done)return 0;if(s.needsPhoto&&!st.photo)return 0;return +s.pay||0;}
  function subDone(s){return state[s.id]&&state[s.id].done;}
  function uid(p){return (p||'s')+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);}

  // ================= Today =================
  function renderToday(){
    var el=document.getElementById('view-today'),html='';
    if(!MODULES.length){ html='<div class="note">Nothing here yet. Go to <b>Setup</b> and add your first area.</div>'; el.innerHTML=html; updateBar(); return; }
    MODULES.forEach(function(m){
      var doneN=m.subs.filter(subDone).length, tot=m.subs.length;
      html+='<div class="mod-head"><div class="mod-em">'+(m.emoji&&m.emoji.charAt(0)==='d'&&m.emoji.indexOf('data:')===0?'<img src="'+m.emoji+'">':esc(m.emoji||'🐾'))+'</div>'+
        '<div class="mod-name"><b>'+esc(m.name)+'</b>'+(m.when?'<span class="when">'+esc(m.when)+'</span>':'')+'</div>'+
        '<div class="mod-prog'+(tot&&doneN===tot?' all':'')+'">'+doneN+'/'+tot+'</div></div>';
      if(!tot){ html+='<div class="mod-empty">No sub-tasks yet — add them in Setup.</div>'; }
      m.subs.forEach(function(s){
        var st=state[s.id],done=st&&st.done;
        var refs=(s.photos&&s.photos.length)?s.photos:[];
        html+='<div class="task'+(done?' done':'')+'"><div class="row"><div class="thumb">'+(st&&st.photo?'<img class="zoom" src="'+st.photo+'">':esc(m.emoji||'🐾'))+'</div>'+
          '<div class="t-body"><h3>'+esc(s.name)+(s.pay?'<span class="pay">'+money(s.pay)+'</span>':'')+'</h3>'+
          '<p>'+esc(s.note)+(s.needsPhoto?' <span class="req">(photo to get paid)</span>':'')+'</p>'+
          (refs.length?'<div class="refs-label">📸 How it should look</div><div class="ref-gallery">'+refs.map(function(p){return '<img class="zoom" src="'+esc(p)+'">';}).join('')+'</div>':'')+'</div></div>';
        if(done){
          html+='<div class="stamp">✓ Done '+fmtTime(st.at)+(st.photo?' <span class="hasphoto">· 📷 +'+money(s.pay)+'</span>':(s.needsPhoto?' <span class="nophoto">· no photo — '+money(s.pay)+' not earned</span>':''))+'</div>';
        } else {
          html+='<div class="actions"><button class="done-btn" data-act="done" data-id="'+s.id+'">Mark Done</button>'+
            '<button class="cam-btn'+(s.needsPhoto?' req':'')+'" data-act="take" data-id="'+s.id+'" title="Take a photo">📷</button>'+
            '<button class="cam-btn'+(s.needsPhoto?' req':'')+'" data-act="lib" data-id="'+s.id+'" title="Choose from library">🖼️</button>'+
            '<input class="cam-in cin-take" type="file" accept="image/*" capture="environment" data-for="'+s.id+'">'+
            '<input class="cam-in cin-lib" type="file" accept="image/*" data-for="'+s.id+'"></div>';
        }
        html+='</div>';
      });
    });
    el.innerHTML=html; updateBar();
  }
  function updateBar(){
    var subs=allSubs(), tot=subs.length;
    var done=subs.filter(function(x){return subDone(x.s);}).length;
    var pct=tot?Math.round(done/tot*100):0;
    document.getElementById('barFill').style.width=pct+'%';
    document.getElementById('barLbl').textContent=done+' of '+tot+' done';
    var earned=subs.reduce(function(s,x){return s+earnedFor(x.s);},0);
    document.getElementById('payPill').textContent=money(earned)+' earned';
    document.getElementById('dayLine').textContent=new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})+" — today's chores";
  }
  document.getElementById('view-today').addEventListener('click',function(e){
    var z=e.target.closest('.zoom');if(z){openLightbox(z.getAttribute('src'));return;}
    var b=e.target.closest('[data-act]');if(!b)return;var id=b.getAttribute('data-id');var act=b.getAttribute('data-act');
    if(act==='take'||act==='lib'){b.parentNode.querySelector('.'+(act==='take'?'cin-take':'cin-lib')+'[data-for="'+id+'"]').click();return;}
    state[id]=Object.assign({},state[id],{done:true,at:new Date().toISOString()});saveState();renderToday();
  });
  document.getElementById('view-today').addEventListener('change',function(e){
    var inp=e.target.closest('.cam-in');if(!inp||!inp.files||!inp.files[0])return;var id=inp.getAttribute('data-for');
    resizeImage(inp.files[0],function(d){state[id]=Object.assign({},state[id],{photo:d});saveState();renderToday();});
  });

  // ================= Dad's View =================
  function renderDad(){
    var el=document.getElementById('view-dad');
    var subs=allSubs();
    var done=subs.filter(function(x){return subDone(x.s);});
    var missing=subs.filter(function(x){return !subDone(x.s);});
    var earned=subs.reduce(function(s,x){return s+earnedFor(x.s);},0);
    var possible=subs.reduce(function(s,x){return s+(+x.s.pay||0);},0);
    var lost=possible-earned;
    var html='<div class="note">Your view from the road. What got done, when, and what it cost him if he skipped it or didn\'t send a photo.</div>';
    html+='<div class="dad-sum"><div class="dcard"><div class="n g">'+done.length+'/'+subs.length+'</div><div class="l">Done</div></div>'+
      '<div class="dcard"><div class="n gold">'+money(earned)+'</div><div class="l">Earned</div></div>'+
      '<div class="dcard"><div class="n r">'+money(lost)+'</div><div class="l">Lost</div></div></div>';
    if(missing.length){html+='<div class="grp">Not done ('+missing.length+')</div>';
      missing.forEach(function(x){var s=x.s;html+='<div class="drow"><span class="dot no"></span><span class="nm"><span class="mod">'+esc(x.m.name)+' · </span>'+esc(s.name)+'</span>'+
        '<span class="ts">-'+money(s.pay)+'</span><button class="ask'+(asks[s.id]?' sent':'')+'" data-ask="'+s.id+'">'+(asks[s.id]?'Asked ✓':'Ask')+'</button></div>';});}
    html+='<div class="grp">Done ('+done.length+')</div>';
    done.forEach(function(x){var s=x.s;var st=state[s.id];var noPay=s.needsPhoto&&!st.photo;
      html+='<div class="drow"><span class="dot '+(noPay?'warn':'ok')+'"></span><span class="nm"><span class="mod">'+esc(x.m.name)+' · </span>'+esc(s.name)+(st.photo?' 📷':(s.needsPhoto?' <span style="color:var(--red)">(no photo)</span>':''))+'</span><span class="ts">'+fmtTime(st.at)+'</span>'+
        '<button class="ask'+(asks[s.id]?' sent':'')+'" data-ask="'+s.id+'">'+(asks[s.id]?'Asked ✓':'Ask')+'</button></div>';});
    html+='<button class="btn-ghost" id="resetBtn" style="width:100%;margin-top:14px">Start a new day (clear today)</button>';
    el.innerHTML=html;
  }
  document.getElementById('view-dad').addEventListener('click',function(e){
    var a=e.target.closest('[data-ask]');
    if(a){var id=a.getAttribute('data-ask');asks[id]=true;localStorage.setItem('cc-asks',JSON.stringify(asks));renderDad();alert('Sent — a "Dad wants a photo" flag shows on that task. (Demo: this is where the real notification goes to their phone.)');return;}
    if(e.target.id==='resetBtn'){if(confirm('Clear today and start fresh?')){state={};asks={};saveState();localStorage.setItem('cc-asks','{}');renderToday();renderDad();}}
  });

  // ================= Setup =================
  function renderSetup(){
    var el=document.getElementById('view-setup');
    var html='<div class="note">This is where YOU build the list. Make an <b>area</b> (name it anything — "Chicken Yard"), then add each little job inside it. Write EXACTLY how you do it, snap a photo, set what it pays. Only you know the particular way — put it here once.</div>';
    html+='<button class="add-btn" id="addModule">＋ Add an area</button>';
    MODULES.forEach(function(m){
      html+='<div class="mod-block"><div class="mod-block-head"><span class="em">'+(isImg(m.emoji)?'<img src="'+m.emoji+'">':esc(m.emoji||'🐾'))+'</span>'+
        '<span class="nm"><b>'+esc(m.name)+'</b><small>'+(m.when?esc(m.when)+' · ':'')+m.subs.length+' task'+(m.subs.length===1?'':'s')+'</small></span>'+
        '<button class="icon-btn" data-medit="'+m.id+'">✏️</button><button class="icon-btn" data-mdel="'+m.id+'">🗑️</button></div>';
      m.subs.forEach(function(s){
        html+='<div class="srow"><span class="em">'+((s.photos&&s.photos[0])?'<img src="'+s.photos[0]+'">':'🔹')+'</span>'+
          '<span class="nm"><b>'+esc(s.name)+'</b><small>'+(s.pay?money(s.pay):'$0')+(s.needsPhoto?' · 📷 for pay':'')+'</small></span>'+
          '<button class="icon-btn" data-sedit="'+m.id+'|'+s.id+'">✏️</button><button class="icon-btn" data-sdel="'+m.id+'|'+s.id+'">🗑️</button></div>';
      });
      html+='<button class="sub-add" data-sadd="'+m.id+'">＋ Add a task to '+esc(m.name)+'</button></div>';
    });
    el.innerHTML=html;
  }
  function isImg(v){return typeof v==='string'&&v.indexOf('data:')===0;}
  document.getElementById('view-setup').addEventListener('click',function(e){
    var t;
    if(e.target.id==='addModule'){openModuleEditor(null);return;}
    if((t=e.target.closest('[data-medit]'))){openModuleEditor(t.getAttribute('data-medit'));return;}
    if((t=e.target.closest('[data-mdel]'))){var m=MODULES.find(function(x){return x.id===t.getAttribute('data-mdel');});
      if(m&&confirm('Delete the whole "'+m.name+'" area and its '+m.subs.length+' task(s)?')){MODULES=MODULES.filter(function(x){return x!==m;});saveModules();renderSetup();renderToday();}return;}
    if((t=e.target.closest('[data-sadd]'))){openSubEditor(t.getAttribute('data-sadd'),null);return;}
    if((t=e.target.closest('[data-sedit]'))){var p=t.getAttribute('data-sedit').split('|');openSubEditor(p[0],p[1]);return;}
    if((t=e.target.closest('[data-sdel]'))){var p2=t.getAttribute('data-sdel').split('|');var mm=MODULES.find(function(x){return x.id===p2[0];});
      if(mm){var ss=mm.subs.find(function(x){return x.id===p2[1];});
        if(ss&&confirm('Delete "'+ss.name+'"?')){mm.subs=mm.subs.filter(function(x){return x!==ss;});saveModules();renderSetup();renderToday();}}return;}
  });

  // ----- module editor (name / icon / when) -----
  function openModuleEditor(id){
    var m=id?MODULES.find(function(x){return x.id===id;}):{name:'',emoji:'🐾',when:'',subs:[]};
    var host=document.getElementById('modalHost');
    host.innerHTML='<div class="modal" id="modal"><div class="sheet">'+
      '<h2>'+(id?'Edit area':'New area')+'</h2>'+
      '<p class="sub">An area groups the little jobs together — like "Chicken Yard" or "Fish Tank."</p>'+
      '<div class="fld"><label>Area name</label><input id="m-name" value="'+esc(m.name||'')+'" placeholder="e.g. Chicken Yard"></div>'+
      '<div class="two"><div class="fld"><label>Icon</label><select id="m-emoji">'+EMOJIS.map(function(x){return '<option'+(x===m.emoji?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div>'+
      '<div class="fld"><label>When (optional)</label><input id="m-when" value="'+esc(m.when||'')+'" placeholder="AM / PM / Daily"></div></div>'+
      '<div class="sheet-actions">'+(id?'<button class="btn-danger" id="mDel">Delete</button>':'')+'<button class="btn-ghost" id="mCancel">Cancel</button><button class="btn-primary" id="mSave">Save</button></div>'+
      '</div></div>';
    document.getElementById('mCancel').onclick=function(){host.innerHTML='';};
    document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')host.innerHTML='';});
    if(id)document.getElementById('mDel').onclick=function(){if(confirm('Delete the whole "'+m.name+'" area and its '+m.subs.length+' task(s)?')){MODULES=MODULES.filter(function(x){return x.id!==id;});saveModules();host.innerHTML='';renderSetup();renderToday();}};
    document.getElementById('mSave').onclick=function(){
      var name=document.getElementById('m-name').value.trim();if(!name){alert('Give the area a name.');return;}
      var emoji=document.getElementById('m-emoji').value, when=document.getElementById('m-when').value.trim();
      if(id){m.name=name;m.emoji=emoji;m.when=when;}
      else{MODULES.push({id:uid('m'),name:name,emoji:emoji,when:when,subs:[]});}
      saveModules();host.innerHTML='';renderSetup();renderToday();
    };
  }

  // ----- sub-task editor (instruction / photos / pay / needsPhoto) -----
  function openSubEditor(moduleId, subId){
    var m=MODULES.find(function(x){return x.id===moduleId;});if(!m)return;
    var s=subId?m.subs.find(function(x){return x.id===subId;}):{name:'',note:'',pay:1,needsPhoto:false,photos:[]};
    var host=document.getElementById('modalHost');
    host.innerHTML='<div class="modal" id="modal"><div class="sheet">'+
      '<h2>'+(subId?'Edit task':'New task')+'</h2>'+
      '<p class="sub">Inside <b>'+esc(m.name)+'</b></p>'+
      '<div class="fld"><label>What is it?</label><input id="s-name" value="'+esc(s.name||'')+'" placeholder="e.g. Collect eggs"></div>'+
      '<div class="fld"><label>Exactly how to do it</label><textarea id="s-note" placeholder="Every step, and WHY (e.g. don\'t leave the hose running — chlorine kills the fish)">'+esc(s.note||'')+'</textarea></div>'+
      '<div class="fld"><label>Pays ($)</label><input id="s-pay" type="number" step="0.25" value="'+(s.pay!=null?s.pay:'')+'" placeholder="1.00"></div>'+
      '<div class="fld"><label>Photos — how it should look</label>'+
      '<div class="photo-btns"><button type="button" class="pbtn" id="s-take">📷 Take a photo</button><button type="button" class="pbtn" id="s-lib">🖼️ From library</button></div>'+
      '<input id="s-photo-take" type="file" accept="image/*" capture="environment" hidden>'+
      '<input id="s-photo-lib" type="file" accept="image/*" multiple hidden></div>'+
      '<div id="s-strip" class="photo-strip"></div>'+
      '<label class="chk" style="margin:6px 0 16px"><input type="checkbox" id="s-needs"'+(s.needsPhoto?' checked':'')+'> Photo required to get paid</label>'+
      '<div class="sheet-actions">'+(subId?'<button class="btn-danger" id="sDel">Delete</button>':'')+'<button class="btn-ghost" id="sCancel">Cancel</button><button class="btn-primary" id="sSave">Save</button></div>'+
      '</div></div>';
    var photos=(s.photos&&s.photos.slice())||[];
    function drawStrip(){document.getElementById('s-strip').innerHTML=photos.map(function(p,i){return '<div class="pthumb"><img src="'+p+'"><button type="button" data-rm="'+i+'">×</button></div>';}).join('');}
    drawStrip();
    document.getElementById('s-strip').addEventListener('click',function(e){var b=e.target.closest('[data-rm]');if(!b)return;photos.splice(+b.getAttribute('data-rm'),1);drawStrip();});
    function addFiles(e){[].slice.call(e.target.files).forEach(function(f){resizeImage(f,function(d){photos.push(d);drawStrip();});});e.target.value='';}
    document.getElementById('s-take').onclick=function(){document.getElementById('s-photo-take').click();};
    document.getElementById('s-lib').onclick=function(){document.getElementById('s-photo-lib').click();};
    document.getElementById('s-photo-take').addEventListener('change',addFiles);
    document.getElementById('s-photo-lib').addEventListener('change',addFiles);
    document.getElementById('sCancel').onclick=function(){host.innerHTML='';};
    document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')host.innerHTML='';});
    if(subId)document.getElementById('sDel').onclick=function(){if(confirm('Delete "'+s.name+'"?')){m.subs=m.subs.filter(function(x){return x.id!==subId;});saveModules();host.innerHTML='';renderSetup();renderToday();}};
    document.getElementById('sSave').onclick=function(){
      var name=document.getElementById('s-name').value.trim();if(!name){alert('Give the task a name.');return;}
      var obj={id:subId||uid('s'),name:name,note:document.getElementById('s-note').value.trim(),
        pay:parseFloat(document.getElementById('s-pay').value)||0,needsPhoto:document.getElementById('s-needs').checked,photos:photos};
      if(subId){var i=m.subs.findIndex(function(x){return x.id===subId;});m.subs[i]=obj;}else{m.subs.push(obj);}
      saveModules();host.innerHTML='';renderSetup();renderToday();
    };
  }

  // ================= tabs =================
  var tabs={'tab-today':['view-today',renderToday],'tab-dad':['view-dad',renderDad],'tab-setup':['view-setup',renderSetup]};
  Object.keys(tabs).forEach(function(tid){document.getElementById(tid).addEventListener('click',function(){
    Object.keys(tabs).forEach(function(k){document.getElementById(k).setAttribute('aria-selected',k===tid?'true':'false');document.getElementById(tabs[k][0]).hidden=(k!==tid);});
    tabs[tid][1]();document.querySelector('header').scrollIntoView({block:'start'});
  });});
  renderToday();
})();
</script>
</body>
</html>
