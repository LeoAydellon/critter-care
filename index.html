<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>Tend</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f7a4d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
  :root{
    --bg:#f4f6f2;--card:#fff;--line:#e2e7db;--ink:#1a2119;--mute:#5f6b5a;--faint:#93a08d;
    --green:#1f7a4d;--green-soft:#e3f2e8;--green-deep:#155f3a;
    --amber:#c9781a;--amber-soft:#fbeeda;--red:#cf3742;--red-soft:#fbe4e5;--gold:#b8860b;
    --shadow:0 1px 2px rgba(20,40,20,.05),0 6px 20px rgba(20,50,25,.06);
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#12160f;--card:#1a1f16;--line:#2b3226;--ink:#eef1e9;--mute:#9aa691;--faint:#5f6b56;
    --green:#43c483;--green-soft:#15291d;--green-deep:#43c483;--amber:#eaa93f;--amber-soft:#2c2211;
    --red:#f2545b;--red-soft:#301518;--gold:#e0b64a;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);}}
  :root[data-theme="light"]{--bg:#f4f6f2;--card:#fff;--line:#e2e7db;--ink:#1a2119;--mute:#5f6b5a;--faint:#93a08d;--green:#1f7a4d;--green-soft:#e3f2e8;--green-deep:#155f3a;--amber:#c9781a;--amber-soft:#fbeeda;--red:#cf3742;--red-soft:#fbe4e5;--gold:#b8860b;--shadow:0 1px 2px rgba(20,40,20,.05),0 6px 20px rgba(20,50,25,.06);}
  :root[data-theme="dark"]{--bg:#12160f;--card:#1a1f16;--line:#2b3226;--ink:#eef1e9;--mute:#9aa691;--faint:#5f6b56;--green:#43c483;--green-soft:#15291d;--green-deep:#43c483;--amber:#eaa93f;--amber-soft:#2c2211;--red:#f2545b;--red-soft:#301518;--gold:#e0b64a;--shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);}

  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:84px}
  .tnum{font-variant-numeric:tabular-nums}
  header{background:var(--green);color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 18px 16px}
  .h-top{display:flex;align-items:center;gap:11px}
  .h-logo{width:34px;height:34px;flex:none}
  header h1{margin:0;font-size:19px;font-weight:800}
  header .day{margin:12px 0 0;font-size:14px;opacity:.92}
  .bar{height:10px;border-radius:99px;background:rgba(255,255,255,.28);margin-top:10px;overflow:hidden}
  .bar>i{display:block;height:100%;background:#fff;border-radius:99px;transition:width .35s ease}
  .bar-lbl{font-size:13px;opacity:.95;margin-top:7px;font-weight:600;display:flex;justify-content:space-between}
  .pay-pill{background:rgba(255,255,255,.22);border-radius:99px;padding:1px 10px;font-weight:800}

  main{max-width:640px;margin:0 auto;padding:16px 14px 20px}

  /* per-area color palette (c0..c7) — theme aware via prefers-color-scheme */
  .c0{--mod-soft:#fbeeda;--mod-deep:#b06f00} .c1{--mod-soft:#e3f2e8;--mod-deep:#155f3a}
  .c2{--mod-soft:#e2edfb;--mod-deep:#1c5aa8} .c3{--mod-soft:#efe6fb;--mod-deep:#6b3fb0}
  .c4{--mod-soft:#fce8dd;--mod-deep:#b0501a} .c5{--mod-soft:#ddf1ee;--mod-deep:#0f7568}
  .c6{--mod-soft:#fbe4ee;--mod-deep:#b02f6b} .c7{--mod-soft:#fbe4e5;--mod-deep:#b0303a}
  @media (prefers-color-scheme:dark){
    .c0{--mod-soft:#2c2211;--mod-deep:#eaa93f} .c1{--mod-soft:#15291d;--mod-deep:#43c483}
    .c2{--mod-soft:#14202e;--mod-deep:#5aa0ee} .c3{--mod-soft:#211630;--mod-deep:#b58cf0}
    .c4{--mod-soft:#2e1c12;--mod-deep:#f0925a} .c5{--mod-soft:#122926;--mod-deep:#43c4b0}
    .c6{--mod-soft:#2e1622;--mod-deep:#f06aa0} .c7{--mod-soft:#301518;--mod-deep:#f2545b}
  }

  /* each area = a whole color-washed panel (Today) */
  .mod-sec{background:var(--mod-soft,transparent);border:1px solid var(--line);border-left:6px solid var(--mod-deep,var(--green));border-radius:16px;padding:8px 10px 6px;margin:16px 0}
  .mod-sec:first-child{margin-top:8px}
  /* module section header (Today) — sits on the washed panel */
  .mod-head{display:flex;align-items:center;gap:11px;margin:6px 4px 12px;padding:2px}
  .mod-em{width:42px;height:42px;flex:none;border-radius:12px;background:var(--card);color:var(--mod-deep,var(--green-deep));display:grid;place-items:center;font-size:23px;overflow:hidden}
  .mod-em img{width:100%;height:100%;object-fit:cover}
  .mod-name{flex:1;min-width:0}
  .mod-name b{font-size:17px;font-weight:800;display:block;line-height:1.2;color:var(--mod-deep,var(--ink))}
  .mod-name .when{display:inline-block;background:var(--mod-deep,var(--green-deep));color:#fff;font-weight:700;font-size:10.5px;border-radius:99px;padding:1px 8px;margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
  .mod-prog{font-size:12.5px;font-weight:800;color:var(--mod-deep,var(--faint));white-space:nowrap;opacity:.9}
  .mod-prog.all{color:var(--mod-deep,var(--green));opacity:1}
  .grp{margin:20px 2px 9px;font-size:12.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);font-weight:800}

  .task{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--mod-deep,var(--line));border-radius:16px;box-shadow:var(--shadow);margin:0 0 10px 12px;overflow:hidden;transition:opacity .2s}
  .task .row{display:flex;gap:13px;padding:13px}
  .thumb{width:66px;height:66px;flex:none;border-radius:12px;background:var(--green-soft);display:grid;place-items:center;font-size:26px;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .t-body{flex:1;min-width:0}
  .t-body h3{margin:0;font-size:15.5px;line-height:1.25}
  .pay{display:inline-block;color:var(--gold);font-weight:800;font-size:12px;margin-left:6px}
  .t-body p{margin:6px 0 0;font-size:13.5px;color:var(--mute);white-space:pre-wrap}
  .req{color:var(--red);font-weight:700}
  .actions{display:flex;gap:9px;padding:0 13px 13px}
  .done-btn{flex:1;appearance:none;border:0;border-radius:12px;background:var(--green);color:#fff;font-weight:800;font-size:16px;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .done-btn:active{transform:translateY(1px)}
  .cam-btn{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--mute);border-radius:12px;padding:0 16px;font-size:20px;cursor:pointer}
  .cam-btn.req{border-color:var(--gold);color:var(--gold)}
  .cam-in{display:none}
  .task.done{opacity:.62}
  .task.done .done-btn{background:var(--green-soft);color:var(--green-deep)}
  .stamp{font-size:12px;color:var(--green-deep);font-weight:700;padding:0 13px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .hasphoto{color:var(--gold)}
  .nophoto{color:var(--red)}
  .t-strip{display:flex;gap:6px;margin-top:9px;overflow-x:auto}
  .t-strip img{width:52px;height:52px;border-radius:8px;object-fit:cover;flex:none;border:1px solid var(--line)}
  .ref-gallery{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
  .reffig{margin:0;width:calc(50% - 5px);background:var(--bg);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .reffig img{width:100%;height:112px;object-fit:cover;display:block;cursor:zoom-in}
  .reffig figcaption{padding:7px 10px;font-size:12.5px;color:var(--ink);font-weight:600;line-height:1.32}
  .thumb img.zoom{cursor:zoom-in}
  .pcard{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:8px;margin-bottom:8px}
  .pcard img{width:60px;height:60px;border-radius:8px;object-fit:cover;flex:none;cursor:zoom-in}
  .pcard .pcap{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:9px;font-size:13px;font-family:inherit;color:var(--ink)}
  .pcard .prm{width:30px;height:30px;border-radius:8px;border:0;background:var(--red-soft);color:var(--red);font-size:17px;cursor:pointer;flex:none;line-height:1}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:80;display:flex;align-items:center;justify-content:center;padding:14px}
  .lightbox img{max-width:100%;max-height:100%;border-radius:10px}
  .lightbox .x{position:fixed;top:calc(env(safe-area-inset-top) + 12px);right:16px;width:40px;height:40px;border-radius:50%;border:0;background:rgba(255,255,255,.18);color:#fff;font-size:22px;cursor:pointer}
  .mod-empty{margin:0 0 10px 12px;font-size:13px;color:var(--faint);font-style:italic;padding:4px 2px}

  .dad-sum{display:flex;gap:10px;margin-bottom:12px}
  .dcard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;box-shadow:var(--shadow);text-align:center}
  .dcard .n{font-size:22px;font-weight:800}
  .dcard .n.g{color:var(--green)} .dcard .n.r{color:var(--red)} .dcard .n.gold{color:var(--gold)}
  .dcard .l{font-size:11.5px;color:var(--mute);margin-top:3px;font-weight:600}
  .drow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;box-shadow:var(--shadow)}
  .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .dot.ok{background:var(--green)} .dot.no{background:var(--red)} .dot.warn{background:var(--gold)}
  .drow .nm{flex:1;min-width:0;font-weight:600;font-size:14px}
  .drow .nm .mod{color:var(--faint);font-weight:700;font-size:12px}
  .drow .ts{font-size:12px;color:var(--mute)}
  .ask{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--green-deep);border-radius:99px;font-size:12px;font-weight:700;padding:6px 11px;cursor:pointer;white-space:nowrap}
  .ask.sent{background:var(--green-soft);border-color:transparent}
  .note{background:var(--green-soft);border-radius:12px;padding:13px 15px;font-size:13px;color:var(--green-deep);margin-bottom:14px}

  /* setup */
  .add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;appearance:none;border:1.5px dashed var(--green);background:transparent;color:var(--green-deep);border-radius:14px;padding:14px;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:14px}
  .io-row{display:flex;gap:9px;margin-bottom:16px}
  .io-btn{flex:1;appearance:none;border:1px solid var(--line);background:var(--card);color:var(--green-deep);border-radius:12px;padding:11px;font-weight:800;font-size:13.5px;cursor:pointer;box-shadow:var(--shadow)}
  .io-btn:active{transform:translateY(1px)}
  .mod-block{background:var(--mod-soft,var(--card));border:1px solid var(--line);border-left:6px solid var(--mod-deep,var(--line));border-radius:16px;box-shadow:var(--shadow);margin-bottom:13px;overflow:hidden}
  .mod-block-head{display:flex;align-items:center;gap:11px;padding:12px 13px;background:var(--mod-soft,var(--green-soft))}
  .mod-block-head .em{font-size:22px;width:32px;height:32px;display:grid;place-items:center;border-radius:8px;overflow:hidden;background:var(--card)}
  .mod-block-head .em img{width:32px;height:32px;object-fit:cover;border-radius:8px}
  .mod-block-head .nm{flex:1;min-width:0}
  .mod-block-head .nm b{font-size:15.5px;color:var(--mod-deep,var(--green-deep))}
  .drag-handle{font-size:20px;color:var(--mod-deep,var(--faint));cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;padding:2px 4px;line-height:1;flex:none}
  .mod-block.dragging{opacity:.92;box-shadow:0 12px 34px rgba(0,0,0,.28);position:relative}
  .reorder-hint{font-size:12px;color:var(--faint);margin:-6px 2px 14px;font-style:italic}
  .icon-btn.mv{font-size:23px;font-weight:900;color:var(--mod-deep,var(--green-deep));padding:4px 5px;line-height:1}
  .mod-block-head .nm small{display:block;color:var(--mute);font-size:12px}
  .srow{display:flex;align-items:center;gap:10px;padding:10px 13px;border-top:1px solid var(--line)}
  .srow .em{font-size:16px;width:30px;height:30px;flex:none;display:grid;place-items:center;border-radius:7px;overflow:hidden;background:var(--bg)}
  .srow .em img{width:30px;height:30px;object-fit:cover;border-radius:7px}
  .srow .nm{flex:1;min-width:0} .srow .nm b{font-size:14px} .srow .nm small{display:block;color:var(--mute);font-size:11.5px}
  .sub-add{display:flex;align-items:center;gap:7px;width:100%;appearance:none;border:0;border-top:1px dashed var(--line);background:transparent;color:var(--green-deep);padding:11px;font-weight:700;font-size:13.5px;cursor:pointer}
  .icon-btn{appearance:none;border:0;background:transparent;font-size:17px;cursor:pointer;padding:5px 6px;border-radius:8px;color:var(--mute)}
  .icon-btn:hover{background:var(--bg)}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--card);width:100%;max-width:640px;max-height:92vh;overflow:auto;border-radius:18px 18px 0 0;padding:18px 16px calc(env(safe-area-inset-bottom) + 20px)}
  .sheet h2{margin:2px 0 4px;font-size:19px}
  .sheet .sub{margin:0 0 14px;color:var(--mute);font-size:13px}
  .fld{margin-bottom:13px} .fld label{display:block;font-size:12.5px;font-weight:700;color:var(--mute);margin-bottom:5px}
  .fld input,.fld textarea,.fld select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit}
  .fld textarea{min-height:74px;resize:vertical}
  .two{display:flex;gap:10px} .two>.fld{flex:1}
  .chk{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--ink)}
  .chk input{width:20px;height:20px}
  .photo-strip{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px}
  .pthumb{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
  .pthumb img{width:100%;height:100%;object-fit:cover}
  .pthumb button{position:absolute;top:2px;right:2px;width:22px;height:22px;border-radius:50%;border:0;background:rgba(0,0,0,.6);color:#fff;font-size:15px;line-height:1;cursor:pointer;padding:0}
  .sheet-actions{display:flex;gap:10px;margin-top:8px}
  .btn-primary{flex:1;appearance:none;border:0;background:var(--green);color:#fff;border-radius:12px;padding:14px;font-weight:800;font-size:16px;cursor:pointer}
  .btn-ghost{appearance:none;border:1px solid var(--line);background:transparent;color:var(--mute);border-radius:12px;padding:14px 18px;font-weight:700;cursor:pointer}
  .btn-danger{appearance:none;border:1px solid var(--red);background:transparent;color:var(--red);border-radius:12px;padding:14px 18px;font-weight:700;cursor:pointer}
  .photo-btns{display:flex;gap:9px}
  .pbtn{flex:1;appearance:none;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:10px;padding:11px;font-weight:700;font-size:14px;cursor:pointer}
  .pbtn:active{transform:translateY(1px)}

  .tabbar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);display:flex;padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);z-index:30}
  .tabbar button{flex:1;appearance:none;border:0;background:transparent;color:var(--faint);font-weight:700;font-size:12px;padding:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .tabbar button .ic{font-size:21px}
  .tabbar button[aria-selected="true"]{color:var(--green)}
  [hidden]{display:none!important}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

    <svg class="h-logo" viewBox="0 0 40 40" aria-hidden="true">
      <circle cx="20" cy="22" r="11" fill="#fff"/><circle cx="12" cy="11" r="4.4" fill="#fff"/>
      <circle cx="28" cy="11" r="4.4" fill="#fff"/><circle cx="6" cy="20" r="3.8" fill="#fff"/><circle cx="34" cy="20" r="3.8" fill="#fff"/>
    </svg>
    <h1 id="hTitle">Tend</h1>
  </div>
  <p class="day" id="dayLine">Today's chores</p>

<!-- ===== Tend cloud sync (Firebase Firestore, free/no-card). Fail-open: if this
     can't load, the app keeps working 100% locally exactly as before. ===== -->
<script>
  // A promise the main app awaits; resolves to the cloud API, or null if Firebase
  // never loads (offline / blocked). 7s timeout so the app NEVER hangs.
  window.__tendCloudReady = new Promise(function(r){ window.__tendCloudResolve = r; });
  setTimeout(function(){ if(window.__tendCloudResolve){ window.__tendCloudResolve(null); window.__tendCloudResolve=null; } }, 7000);
</script>
<script type="module">
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getFirestore, doc, getDoc, setDoc, deleteDoc, onSnapshot, collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const firebaseConfig = {
      apiKey: "AIzaSyDProgn2Yl5pqyBgkgb3bm_id0pB8tpCl8",
      authDomain: "tend-app-e9135.firebaseapp.com",
      projectId: "tend-app-e9135",
      storageBucket: "tend-app-e9135.firebasestorage.app",
      messagingSenderId: "256016468538",
      appId: "1:256016468538:web:850dffa917cdc3de360303"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    // farm id: from the URL (?farm=xxx) if shared with you; else the one this device already uses
    // (saved locally so re-opening always returns to the SAME board); else make a new one.
    const u = new URL(location.href);
    let fid = u.searchParams.get('farm');
    try { if(!fid){ fid = localStorage.getItem('tend-farm') || ''; } } catch(e){}
    if(!fid){ fid = 'farm-' + Math.random().toString(36).slice(2,9); }
    try { localStorage.setItem('tend-farm', fid); } catch(e){}
    if(u.searchParams.get('farm') !== fid){ u.searchParams.set('farm', fid); history.replaceState(null,'',u); }
    const sane = function(s){ return String(s).replace(/[^a-zA-Z0-9_-]/g,'_'); };
    // Each AREA is its own document (so photo-heavy setups never hit the 1MB per-doc cap),
    // and each day's per-task state is its own document too.
    window.__tendCloud = {
      farmId: fid, db: db, getDoc: getDoc, setDoc: setDoc, deleteDoc: deleteDoc, onSnapshot: onSnapshot, getDocs: getDocs,
      metaRef:     function(){ return doc(db,'farms',fid); },
      modulesCol:  function(){ return collection(db,'farms',fid,'modules'); },
      moduleRef:   function(id){ return doc(db,'farms',fid,'modules',sane(id)); },
      dayTasksCol: function(k){ return collection(db,'farms',fid,'days',sane(k),'tasks'); },
      dayTaskRef:  function(k,tid){ return doc(db,'farms',fid,'days',sane(k),'tasks',sane(tid)); }
    };
    if(window.__tendCloudResolve){ window.__tendCloudResolve(window.__tendCloud); window.__tendCloudResolve=null; }
  } catch(e){
    if(window.__tendCloudResolve){ window.__tendCloudResolve(null); window.__tendCloudResolve=null; }
  }
</script>

<script>
(function(){
  // ================= data model =================

  var EMOJIS=['🐔','🦆','🐦','🦎','🦖','🐠','🐱','🐶','🐐','🐰','🐴','🐷','🪷','⛲','🚰','🌳','🪴','🌾','🌸','🐢','🐝','🦜','🌿','🥕'];

  // ---------- storage (v2 = modules) with migration from old flat list ----------
  var LS_KEY='tend-modules-v2';
  function migrateFlat(){
    try{
      var old=JSON.parse(localStorage.getItem('cc-tasks'));
      if(!Array.isArray(old)||!old.length) return null;
      var byGrp={}, order=[];
      old.forEach(function(t){
        var g=t.grp||'Chores';
        if(!byGrp[g]){byGrp[g]={id:'m-'+(t.id||Math.random()).toString(36).slice(0,6),name:g,emoji:t.emoji||'🐾',when:t.when||'',subs:[]};order.push(g);}
        byGrp[g].subs.push({id:(t.id||('s'+order.length+'-'+byGrp[g].subs.length)),name:t.name||'Task',note:t.note||'',
          pay:+t.pay||0,needsPhoto:!!t.needsPhoto,photos:(t.photos&&t.photos.slice())||(t.photo?[t.photo]:[])});
      });
      return order.map(function(g){return byGrp[g];});
    }catch(e){ return null; }
  }
  function loadModulesFromLS(){
    try{var m=JSON.parse(localStorage.getItem(LS_KEY));if(Array.isArray(m)&&m.length)return m;}catch(e){}
    var mig=migrateFlat(); if(mig) return mig;
    return JSON.parse(JSON.stringify(SEED));
  }
  // ---- storage backend: IndexedDB (holds hundreds of MB) with localStorage migration + fallback ----
  var DB=null;
  function idbOpen(){return new Promise(function(res,rej){try{var r=indexedDB.open('tend-db',1);
    r.onupgradeneeded=function(){r.result.createObjectStore('kv');};
    r.onsuccess=function(){res(r.result);};r.onerror=function(){rej(r.error);};}catch(e){rej(e);}});}
  function idbGet(k){return new Promise(function(res){try{var t=DB.transaction('kv','readonly').objectStore('kv').get(k);
    t.onsuccess=function(){res(t.result);};t.onerror=function(){res(undefined);};}catch(e){res(undefined);}});}
  function idbSet(k,v){return new Promise(function(res,rej){try{var t=DB.transaction('kv','readwrite').objectStore('kv').put(v,k);
    t.onsuccess=function(){res(true);};t.onerror=function(){rej(t.error);};}catch(e){rej(e);}});}
  var MODULES=[], state={}, asks={};
  function todayKey(){ return 'day-'+new Date().toDateString(); }
  // ---- cloud (Firestore) mirror — additive, fail-open. Local storage stays the source of truth on-device. ----
  // Each AREA is its own cloud doc + each day's per-task state is its own doc, so photo-heavy setups sync fine.
  var CLOUD=null;
  function saneId(s){ return String(s).replace(/[^a-zA-Z0-9_-]/g,'_'); }
  function cloudSaveModules(){
    if(!CLOUD)return;
    try{
      MODULES.forEach(function(m,i){ try{ CLOUD.setDoc(CLOUD.moduleRef(m.id||('m'+i)), Object.assign({_order:i}, m)); }catch(e){} });
      try{ CLOUD.setDoc(CLOUD.metaRef(), {asks:asks, count:MODULES.length, updatedAt:Date.now()}, {merge:true}); }catch(e){}
      // remove area-docs that were deleted locally
      try{ CLOUD.getDocs(CLOUD.modulesCol()).then(function(qs){ var keep={}; MODULES.forEach(function(m,i){ keep[saneId(m.id||('m'+i))]=1; });
        qs.forEach(function(d){ if(!keep[d.id]){ try{ CLOUD.deleteDoc(CLOUD.moduleRef(d.id)); }catch(e){} } }); }); }catch(e){}
    }catch(e){}
  }
  function cloudSaveAsks(){ if(!CLOUD)return; try{ CLOUD.setDoc(CLOUD.metaRef(),{asks:asks,updatedAt:Date.now()},{merge:true}); }catch(e){} }
  function cloudSaveDay(){ if(!CLOUD)return; try{ var k=todayKey(); Object.keys(state).forEach(function(tid){ try{ CLOUD.setDoc(CLOUD.dayTaskRef(k,tid), Object.assign({_tid:tid}, state[tid]||{})); }catch(e){} }); }catch(e){} }
  function saveModules(){
    try{ localStorage.setItem('tend-edited','1'); }catch(e){}   // mark this device as having a real, user-built board
    if(DB){ idbSet('modules',MODULES).catch(function(){alert('Couldn\'t save — try removing a photo, or use fewer/smaller photos.');}); }
    else { try{ localStorage.setItem(LS_KEY,JSON.stringify(MODULES)); }catch(e){ alert('Couldn\'t save — the phone storage is full. Try fewer/smaller photos.'); } }
    cloudSaveModules();
    return true;
  }
  function saveState(){ if(DB){ idbSet(todayKey(),state).catch(function(){}); } else { try{ localStorage.setItem('cc-'+todayKey(),JSON.stringify(state)); }catch(e){} } cloudSaveDay(); }
  function saveAsks(){ if(DB){ idbSet('asks',asks).catch(function(){}); } else { try{ localStorage.setItem('cc-asks',JSON.stringify(asks)); }catch(e){} } cloudSaveAsks(); }
  async function boot(){
    try{ DB=await idbOpen(); }catch(e){ DB=null; }
    var m = DB ? await idbGet('modules') : null;
    if(!(Array.isArray(m)&&m.length)){ m=loadModulesFromLS(); if(DB){ try{ await idbSet('modules',m); }catch(e){} } }
    MODULES=m;
    var st = DB ? await idbGet(todayKey()) : null;
    if(st==null){ try{ st=JSON.parse(localStorage.getItem('cc-'+todayKey())||localStorage.getItem('cc-day-'+new Date().toDateString())||'{}'); }catch(e){ st={}; } }
    state=st||{};
    var ak = DB ? await idbGet('asks') : null;
    if(ak==null){ try{ ak=JSON.parse(localStorage.getItem('cc-asks')||'{}'); }catch(e){ ak={}; } }
    asks=ak||{};
    renderToday();
    hydrateCloud();  // layer live sync on top of the already-rendered local app
  }
  function modulesFromDocs(qs){ var arr=[]; qs.forEach(function(d){ arr.push(d.data()); }); arr.sort(function(a,b){ return (a._order||0)-(b._order||0); });
    return arr.map(function(m){ var c=Object.assign({},m); delete c._order; return c; }); }
  function stateFromDocs(qs){ var st={}; qs.forEach(function(d){ var v=d.data()||{}; var tid=v._tid||d.id; var c=Object.assign({},v); delete c._tid; st[tid]=c; }); return st; }
  // Pull the shared board from the cloud (if reachable) and keep it live. Everything guarded — never blocks the app.
  async function hydrateCloud(){
    try{ CLOUD = await window.__tendCloudReady; }catch(e){ CLOUD=null; }
    if(!CLOUD) return;  // offline / blocked → app stays fully local, no error
    try{
      var qs = await CLOUD.getDocs(CLOUD.modulesCol());
      var cloudMods = modulesFromDocs(qs);
      var edited=false; try{ edited = localStorage.getItem('tend-edited')==='1'; }catch(e){}
      if(cloudMods.length){
        // A shared board already exists → ADOPT it. Never overwrite a shared board with this device's
        // local copy — that's the bug that let a blank phone wipe the board with its template.
        MODULES = cloudMods; if(DB){ try{ idbSet('modules',MODULES); }catch(e){} }
      } else if(edited){
        cloudSaveModules();   // empty board + this device has a REAL user-built setup → seed it up
      }
      // empty board + this device is only the pristine template → do nothing (don't seed a template)
      try{ var meta = await CLOUD.getDoc(CLOUD.metaRef()); if(meta.exists() && meta.data() && meta.data().asks){ asks=meta.data().asks; if(DB){ try{ idbSet('asks',asks); }catch(e){} } } }catch(e){}
      var ts = await CLOUD.getDocs(CLOUD.dayTasksCol(todayKey()));
      if(ts && ts.size>0){ state = stateFromDocs(ts); } else { cloudSaveDay(); }
      renderToday(); if(document.getElementById('view-setup') && document.getElementById('view-setup').offsetParent){ renderSetup(); }
      // realtime: any phone's change flows to every phone
      CLOUD.onSnapshot(CLOUD.modulesCol(), function(qs2){ var arr=modulesFromDocs(qs2); if(!arr.length)return; MODULES=arr; if(DB){ try{ idbSet('modules',MODULES); }catch(e){} }
        renderToday(); if(document.getElementById('view-setup') && document.getElementById('view-setup').offsetParent){ renderSetup(); } });
      CLOUD.onSnapshot(CLOUD.dayTasksCol(todayKey()), function(qs2){ state = stateFromDocs(qs2); renderToday(); });
    }catch(e){ /* fail-open: keep working locally */ }
  }

  // ---- Backup / Restore: your work can never be lost ----
  function backupJSON(){ return JSON.stringify({app:'tend',version:1,exportedAt:new Date().toISOString(),modules:MODULES,state:state,asks:asks},null,0); }
  // ---- Share the live board: one link that carries your whole setup + photos to any phone ----
  function boardLink(){
    var fid = (window.__tendCloud&&window.__tendCloud.farmId) || (new URL(location.href)).searchParams.get('farm') || '';
    return location.origin+location.pathname+'?farm='+fid;
  }
  function shareBoard(){
    var fid = (window.__tendCloud&&window.__tendCloud.farmId) || (new URL(location.href)).searchParams.get('farm') || '';
    if(!fid){ alert('Give it a second to connect to the internet, then tap Share again.'); return; }
    var link = boardLink();
    if(navigator.share){ navigator.share({title:'Tend — our animal chores', text:'Open our chore board (all set up and ready):', url:link}).catch(function(){ copyBoardLink(link); }); }
    else copyBoardLink(link);
  }
  function copyBoardLink(link){
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(link).then(function(){ alert('Link copied! Paste it to Monet or Raphael in a text.'); }, function(){ promptBoardLink(link); }); }
    else promptBoardLink(link);
  }
  function promptBoardLink(link){ window.prompt('Copy this link and text it to the kids:', link); }
  function doBackup(){
    var json=backupJSON(), fname='tend-backup-'+new Date().toISOString().slice(0,10)+'.json';
    var blob=new Blob([json],{type:'application/json'});
    try{
      if(navigator.canShare){ var file=new File([blob],fname,{type:'application/json'});
        if(navigator.canShare({files:[file]})){ navigator.share({files:[file],title:'Tend backup'}).catch(function(){backupFallback(json,fname,blob);}); return; } }
    }catch(e){}
    backupFallback(json,fname,blob);
  }
  function backupFallback(json,fname,blob){
    var url=URL.createObjectURL(blob), host=document.getElementById('modalHost');
    host.innerHTML='<div class="modal"><div class="sheet"><h2>Backup your work</h2>'+
      '<p class="sub">Save this somewhere safe — either way works:</p>'+
      '<a class="btn-primary" style="display:block;text-align:center;text-decoration:none;margin-bottom:12px" href="'+url+'" download="'+fname+'">⬇︎ Download backup file</a>'+
      '<p class="sub">…or tap Copy and paste it into a note or email to yourself:</p>'+
      '<textarea readonly id="bkText" style="width:100%;min-height:110px;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:10px;font-size:12px"></textarea>'+
      '<div class="sheet-actions"><button class="btn-primary" id="bkCopy">Copy</button><button class="btn-ghost" id="bkClose">Close</button></div></div></div>';
    document.getElementById('bkText').value=json;
    document.getElementById('bkCopy').onclick=function(){var t=document.getElementById('bkText');t.select();t.setSelectionRange(0,999999);try{document.execCommand('copy');}catch(e){} if(navigator.clipboard){navigator.clipboard.writeText(json).catch(function(){});} this.textContent='Copied ✓';};
    document.getElementById('bkClose').onclick=function(){host.innerHTML='';try{URL.revokeObjectURL(url);}catch(e){}};
  }
  function openRestore(){
    var host=document.getElementById('modalHost');
    host.innerHTML='<div class="modal"><div class="sheet"><h2>Restore from backup</h2>'+
      '<p class="sub">This replaces everything in the app now with your saved backup.</p>'+
      '<div class="fld"><label>Pick a backup file</label><input type="file" accept=".json,application/json" id="rsFile"></div>'+
      '<div class="fld"><label>…or paste backup text</label><textarea id="rsText" placeholder="Paste the backup text here"></textarea></div>'+
      '<div class="sheet-actions"><button class="btn-primary" id="rsGo">Restore</button><button class="btn-ghost" id="rsCancel">Cancel</button></div></div></div>';
    document.getElementById('rsCancel').onclick=function(){host.innerHTML='';};
    document.getElementById('rsFile').onchange=function(){var f=this.files[0];if(!f)return;var fr=new FileReader();fr.onload=function(){document.getElementById('rsText').value=fr.result;};fr.readAsText(f);};
    document.getElementById('rsGo').onclick=function(){applyRestore(document.getElementById('rsText').value);};
  }
  function applyRestore(text){
    var data; try{data=JSON.parse(text);}catch(e){alert("That doesn't look like a valid backup. Paste the whole backup text, or pick the .json file.");return;}
    if(!data||!Array.isArray(data.modules)){alert('This backup is missing its areas — nothing was restored.');return;}
    var when=data.exportedAt?('the backup from '+new Date(data.exportedAt).toLocaleString()):'this backup';
    if(!confirm('Restore '+data.modules.length+' area(s) from '+when+'?\n\nThis replaces what is in the app now.'))return;
    MODULES=data.modules;
    if(data.state&&typeof data.state==='object')state=data.state;
    if(data.asks&&typeof data.asks==='object')asks=data.asks;
    saveModules();saveState();saveAsks();
    document.getElementById('modalHost').innerHTML='';
    renderSetup();renderToday();
    alert('Restored ✓ — '+MODULES.length+' area(s) are back.');
  }

  function fmtTime(iso){var d=new Date(iso),h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+(m<10?'0':'')+m+' '+ap;}
  function money(n){return '$'+(Math.round(n*100)/100).toFixed(2);}
  function esc(t){return (t==null?'':String(t)).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
  function openLightbox(src){ if(!src)return; var h=document.getElementById('modalHost');
    h.innerHTML='<div class="lightbox" id="lightbox"><button class="x" type="button">×</button><img src="'+src+'"></div>';
    document.getElementById('lightbox').addEventListener('click',function(){h.innerHTML='';}); }
  // photos support BOTH old plain-string entries and new {img,cap} objects (per-picture note)
  function pImg(p){ return (typeof p==='string')?p:((p&&p.img)||''); }
  function pCap(p){ return (typeof p==='string')?'':((p&&p.cap)||''); }
  function firstImg(s){ return (s.photos&&s.photos.length)?pImg(s.photos[0]):''; }

  // shrink phone photos before storing (full-size base64 blows past localStorage's ~5MB cap)
  function resizeImage(file, cb){
    var fr=new FileReader();
    fr.onload=function(){
      var img=new Image();
      img.onload=function(){
        var max=800, w=img.width, h=img.height;
        if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
        try{ var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.6)); }
        catch(e){ cb(fr.result); }
      };
      img.onerror=function(){ cb(fr.result); };
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  }

  // ---------- helpers over the 2-level model ----------
  function allSubs(){ var out=[]; MODULES.forEach(function(m){m.subs.forEach(function(s){out.push({s:s,m:m});});}); return out; }
  function findSub(id){ for(var i=0;i<MODULES.length;i++){var m=MODULES[i];for(var j=0;j<m.subs.length;j++){if(m.subs[j].id===id)return {s:m.subs[j],m:m};}} return null; }
  function earnedFor(s){var st=state[s.id];if(!st||!st.done)return 0;if(s.needsPhoto&&!st.photo)return 0;return +s.pay||0;}
  function subDone(s){return state[s.id]&&state[s.id].done;}
  function uid(p){return (p||'s')+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);}

  // stable per-area color (c0..c7) from the area's id/name, so a color follows an area around
  function modColor(m){var s=String(m&&(m.id||m.name)||'');var h=0;for(var i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}return 'c'+(h%8);}

  // ================= Today =================
  function renderToday(){
    var el=document.getElementById('view-today'),html='';
    if(!MODULES.length){ html='<div class="note">Nothing here yet. Go to <b>Setup</b> and add your first area.</div>'; el.innerHTML=html; updateBar(); return; }
    MODULES.forEach(function(m){
      var doneN=m.subs.filter(subDone).length, tot=m.subs.length, cc=modColor(m);
      html+='<div class="mod-sec '+cc+'">';
      html+='<div class="mod-head"><div class="mod-em">'+(m.emoji&&m.emoji.charAt(0)==='d'&&m.emoji.indexOf('data:')===0?'<img src="'+m.emoji+'">':esc(m.emoji||'🐾'))+'</div>'+
        '<div class="mod-name"><b>'+esc(m.name)+'</b>'+(m.when?'<span class="when">'+esc(m.when)+'</span>':'')+'</div>'+
        '<div class="mod-prog'+(tot&&doneN===tot?' all':'')+'">'+doneN+'/'+tot+'</div></div>';
      if(!tot){ html+='<div class="mod-empty">No sub-tasks yet — add them in Setup.</div>'; }
      m.subs.forEach(function(s){
        var st=state[s.id],done=st&&st.done;
        var refs=(s.photos&&s.photos.length)?s.photos:[];
        html+='<div class="task '+cc+(done?' done':'')+'"><div class="row"><div class="thumb">'+(st&&st.photo?'<img class="zoom" src="'+st.photo+'">':esc(m.emoji||'🐾'))+'</div>'+
          '<div class="t-body"><h3>'+esc(s.name)+(s.pay?'<span class="pay">'+money(s.pay)+'</span>':'')+'</h3>'+
          '<p>'+esc(s.note)+(s.needsPhoto?' <span class="req">(photo to get paid)</span>':'')+'</p>'+
          (refs.length?'<div class="ref-gallery">'+refs.map(function(p){var im=pImg(p),cap=pCap(p);return '<figure class="reffig"><img class="zoom" src="'+esc(im)+'">'+(cap?'<figcaption>'+esc(cap)+'</figcaption>':'')+'</figure>';}).join('')+'</div>':'')+'</div></div>';
        if(done){
          html+='<div class="stamp">✓ Done '+fmtTime(st.at)+(st.photo?' <span class="hasphoto">· 📷 +'+money(s.pay)+'</span>':(s.needsPhoto?' <span class="nophoto">· no photo — '+money(s.pay)+' not earned</span>':''))+'</div>';
        } else {
          html+='<div class="actions"><button class="done-btn" data-act="done" data-id="'+s.id+'">Mark Done</button>'+
            '<button class="cam-btn'+(s.needsPhoto?' req':'')+'" data-act="take" data-id="'+s.id+'" title="Take a photo">📷</button>'+
            '<button class="cam-btn'+(s.needsPhoto?' req':'')+'" data-act="lib" data-id="'+s.id+'" title="Choose from library">🖼️</button>'+
            '<input class="cam-in cin-take" type="file" accept="image/*" capture="environment" data-for="'+s.id+'">'+
            '<input class="cam-in cin-lib" type="file" accept="image/*" data-for="'+s.id+'"></div>';
        }
        html+='</div>';
      });
      html+='</div>';
    });
    el.innerHTML=html; updateBar();
  }
  function updateBar(){
    var subs=allSubs(), tot=subs.length;
    var done=subs.filter(function(x){return subDone(x.s);}).length;
    var pct=tot?Math.round(done/tot*100):0;
    document.getElementById('barFill').style.width=pct+'%';
    document.getElementById('barLbl').textContent=done+' of '+tot+' done';
    var earned=subs.reduce(function(s,x){return s+earnedFor(x.s);},0);
    document.getElementById('payPill').textContent=money(earned)+' earned';
    document.getElementById('dayLine').textContent=new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})+" — today's chores";
  }
  document.getElementById('view-today').addEventListener('click',function(e){
    var z=e.target.closest('.zoom');if(z){openLightbox(z.getAttribute('src'));return;}
    var b=e.target.closest('[data-act]');if(!b)return;var id=b.getAttribute('data-id');var act=b.getAttribute('data-act');
    if(act==='take'||act==='lib'){b.parentNode.querySelector('.'+(act==='take'?'cin-take':'cin-lib')+'[data-for="'+id+'"]').click();return;}
    state[id]=Object.assign({},state[id],{done:true,at:new Date().toISOString()});saveState();renderToday();
  });
  document.getElementById('view-today').addEventListener('change',function(e){
    var inp=e.target.closest('.cam-in');if(!inp||!inp.files||!inp.files[0])return;var id=inp.getAttribute('data-for');
    resizeImage(inp.files[0],function(d){state[id]=Object.assign({},state[id],{photo:d});saveState();renderToday();});
  });

  // ================= Dad's View =================
  function renderDad(){
    var el=document.getElementById('view-dad');
    var subs=allSubs();
    var done=subs.filter(function(x){return subDone(x.s);});
    var missing=subs.filter(function(x){return !subDone(x.s);});
    var earned=subs.reduce(function(s,x){return s+earnedFor(x.s);},0);
    var possible=subs.reduce(function(s,x){return s+(+x.s.pay||0);},0);
    var lost=possible-earned;
    var html='<div class="note">Your view from the road. What got done, when, and what it cost him if he skipped it or didn\'t send a photo.</div>';
    html+='<div class="dad-sum"><div class="dcard"><div class="n g">'+done.length+'/'+subs.length+'</div><div class="l">Done</div></div>'+
      '<div class="dcard"><div class="n gold">'+money(earned)+'</div><div class="l">Earned</div></div>'+
      '<div class="dcard"><div class="n r">'+money(lost)+'</div><div class="l">Lost</div></div></div>';
    if(missing.length){html+='<div class="grp">Not done ('+missing.length+')</div>';
      missing.forEach(function(x){var s=x.s;html+='<div class="drow"><span class="dot no"></span><span class="nm"><span class="mod">'+esc(x.m.name)+' · </span>'+esc(s.name)+'</span>'+
        '<span class="ts">-'+money(s.pay)+'</span><button class="ask'+(asks[s.id]?' sent':'')+'" data-ask="'+s.id+'">'+(asks[s.id]?'Asked ✓':'Ask')+'</button></div>';});}
    html+='<div class="grp">Done ('+done.length+')</div>';
    done.forEach(function(x){var s=x.s;var st=state[s.id];var noPay=s.needsPhoto&&!st.photo;
      html+='<div class="drow"><span class="dot '+(noPay?'warn':'ok')+'"></span><span class="nm"><span class="mod">'+esc(x.m.name)+' · </span>'+esc(s.name)+(st.photo?' 📷':(s.needsPhoto?' <span style="color:var(--red)">(no photo)</span>':''))+'</span><span class="ts">'+fmtTime(st.at)+'</span>'+
        '<button class="ask'+(asks[s.id]?' sent':'')+'" data-ask="'+s.id+'">'+(asks[s.id]?'Asked ✓':'Ask')+'</button></div>';});
    html+='<button class="btn-ghost" id="resetBtn" style="width:100%;margin-top:14px">Start a new day (clear today)</button>';
    el.innerHTML=html;
  }
  document.getElementById('view-dad').addEventListener('click',function(e){
    var a=e.target.closest('[data-ask]');
    if(a){var id=a.getAttribute('data-ask');asks[id]=true;saveAsks();renderDad();alert('Sent — a "Dad wants a photo" flag shows on that task. (Demo: this is where the real notification goes to their phone.)');return;}
    if(e.target.id==='resetBtn'){if(confirm('Clear today and start fresh?')){state={};asks={};saveState();saveAsks();renderToday();renderDad();}}
  });

  // ================= Setup =================
  function renderSetup(){
    var el=document.getElementById('view-setup');
    var html='<div class="note">This is where YOU build the list. Make an <b>area</b> (name it anything — "Chicken Yard"), then add each little job inside it. Write EXACTLY how you do it, snap a photo, set what it pays. Only you know the particular way — put it here once.</div>';
    html+='<button id="shareBoardBtn" style="width:100%;background:#2f7a4d;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;margin-bottom:10px;cursor:pointer">🔗 Share this board — send the link to the kids</button>';
    html+='<button class="add-btn" id="addModule">＋ Add an area</button>';
    html+='<div class="io-row"><button class="io-btn" id="backupBtn">⬇︎ Back up my work</button><button class="io-btn" id="restoreBtn">⬆︎ Restore</button></div>';
    if(MODULES.length>1) html+='<div class="reorder-hint">↕︎ Tap the ↑ ↓ arrows on any area to move it up or down the list.</div>';
    MODULES.forEach(function(m){
      var cc=modColor(m);
      html+='<div class="mod-block '+cc+'" data-mid="'+m.id+'"><div class="mod-block-head"><span class="em">'+(isImg(m.emoji)?'<img src="'+m.emoji+'">':esc(m.emoji||'🐾'))+'</span>'+
        '<span class="nm"><b>'+esc(m.name)+'</b><small>'+(m.when?esc(m.when)+' · ':'')+m.subs.length+' task'+(m.subs.length===1?'':'s')+'</small></span>'+
        '<button class="icon-btn mv" data-mup="'+m.id+'" title="Move up">↑</button><button class="icon-btn mv" data-mdown="'+m.id+'" title="Move down">↓</button>'+
        '<button class="icon-btn" data-medit="'+m.id+'">✏️</button><button class="icon-btn" data-mdel="'+m.id+'">🗑️</button></div>';
      m.subs.forEach(function(s){
        html+='<div class="srow"><span class="em">'+(firstImg(s)?'<img src="'+firstImg(s)+'">':'🔹')+'</span>'+
          '<span class="nm"><b>'+esc(s.name)+'</b><small>'+(s.pay?money(s.pay):'$0')+(s.needsPhoto?' · 📷 for pay':'')+'</small></span>'+
          '<button class="icon-btn" data-sedit="'+m.id+'|'+s.id+'">✏️</button><button class="icon-btn" data-sdel="'+m.id+'|'+s.id+'">🗑️</button></div>';
      });
      html+='<button class="sub-add" data-sadd="'+m.id+'">＋ Add a task to '+esc(m.name)+'</button></div>';
    });
    el.innerHTML=html;
  }
  function isImg(v){return typeof v==='string'&&v.indexOf('data:')===0;}
  // move an area up (dir -1) or down (dir +1) in the list — only reorders, never deletes
  function moveModule(id,dir){
    var i=MODULES.findIndex(function(m){return m.id===id;}); if(i<0)return;
    var j=i+dir; if(j<0||j>=MODULES.length)return;
    var t=MODULES[i]; MODULES[i]=MODULES[j]; MODULES[j]=t;
    saveModules(); renderSetup(); renderToday();
  }

  // drag-to-reorder area stacks (touch + mouse). Only reorders the MODULES array — never deletes.
  (function(){
    var setupEl=document.getElementById('view-setup'); var drag=null;
    setupEl.addEventListener('pointerdown',function(e){
      var h=e.target.closest&&e.target.closest('.drag-handle'); if(!h)return;
      e.preventDefault();
      var block=h.closest('.mod-block'); if(!block)return;
      drag={id:h.getAttribute('data-drag'),block:block,startY:e.clientY};
      block.classList.add('dragging');
      try{block.setPointerCapture(e.pointerId);}catch(_){}
    });
    setupEl.addEventListener('pointermove',function(e){
      if(!drag)return; e.preventDefault();
      drag.block.style.pointerEvents='none';
      drag.block.style.zIndex='40';
      drag.block.style.transform='translateY('+(e.clientY-drag.startY)+'px)';
    });
    function end(e){
      if(!drag)return;
      var b=drag.block, pid=drag.id;
      // read the block under the finger BEFORE restoring pointer-events on the dragged block
      var el=document.elementFromPoint(e.clientX,e.clientY);
      var tgt=el&&el.closest?el.closest('.mod-block'):null;
      var tid=tgt&&tgt.getAttribute('data-mid');
      b.style.transform='';b.style.pointerEvents='';b.style.zIndex='';b.classList.remove('dragging');
      drag=null;
      if(tid&&tid!==pid){
        var from=MODULES.findIndex(function(m){return m.id===pid;});
        var to=MODULES.findIndex(function(m){return m.id===tid;});
        if(from>-1&&to>-1){ var mv=MODULES.splice(from,1)[0]; MODULES.splice(to,0,mv); saveModules(); renderSetup(); renderToday(); }
      }
    }
    setupEl.addEventListener('pointerup',end);
    setupEl.addEventListener('pointercancel',function(){ if(drag){var b=drag.block;b.style.transform='';b.style.pointerEvents='';b.style.zIndex='';b.classList.remove('dragging');drag=null;} });
  })();

  document.getElementById('view-setup').addEventListener('click',function(e){
    var t;
    if(e.target.id==='shareBoardBtn'){shareBoard();return;}
    if(e.target.id==='addModule'){openModuleEditor(null);return;}
    if(e.target.id==='backupBtn'){doBackup();return;}
    if(e.target.id==='restoreBtn'){openRestore();return;}
    var mu=e.target.closest&&e.target.closest('[data-mup]'); if(mu){moveModule(mu.getAttribute('data-mup'),-1);return;}
    var md=e.target.closest&&e.target.closest('[data-mdown]'); if(md){moveModule(md.getAttribute('data-mdown'),1);return;}
    if((t=e.target.closest('[data-medit]'))){openModuleEditor(t.getAttribute('data-medit'));return;}
    if((t=e.target.closest('[data-mdel]'))){var m=MODULES.find(function(x){return x.id===t.getAttribute('data-mdel');});
      if(m&&confirm('Delete the whole "'+m.name+'" area and its '+m.subs.length+' task(s)?')){MODULES=MODULES.filter(function(x){return x!==m;});saveModules();renderSetup();renderToday();}return;}
    if((t=e.target.closest('[data-sadd]'))){openSubEditor(t.getAttribute('data-sadd'),null);return;}
    if((t=e.target.closest('[data-sedit]'))){var p=t.getAttribute('data-sedit').split('|');openSubEditor(p[0],p[1]);return;}
    if((t=e.target.closest('[data-sdel]'))){var p2=t.getAttribute('data-sdel').split('|');var mm=MODULES.find(function(x){return x.id===p2[0];});
      if(mm){var ss=mm.subs.find(function(x){return x.id===p2[1];});
        if(ss&&confirm('Delete "'+ss.name+'"?')){mm.subs=mm.subs.filter(function(x){return x!==ss;});saveModules();renderSetup();renderToday();}}return;}
  });

  // ----- module editor (name / icon / when) -----
  function openModuleEditor(id){
    var m=id?MODULES.find(function(x){return x.id===id;}):{name:'',emoji:'🐾',when:'',subs:[]};
    var host=document.getElementById('modalHost');
    host.innerHTML='<div class="modal" id="modal"><div class="sheet">'+
      '<h2>'+(id?'Edit area':'New area')+'</h2>'+
      '<p class="sub">An area groups the little jobs together — like "Chicken Yard" or "Fish Tank."</p>'+
      '<div class="fld"><label>Area name</label><input id="m-name" value="'+esc(m.name||'')+'" placeholder="e.g. Chicken Yard"></div>'+
      '<div class="two"><div class="fld"><label>Icon</label><select id="m-emoji">'+EMOJIS.map(function(x){return '<option'+(x===m.emoji?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div>'+
      '<div class="fld"><label>When (optional)</label><input id="m-when" value="'+esc(m.when||'')+'" placeholder="AM / PM / Daily"></div></div>'+
      '<div class="sheet-actions">'+(id?'<button class="btn-danger" id="mDel">Delete</button>':'')+'<button class="btn-ghost" id="mCancel">Cancel</button><button class="btn-primary" id="mSave">Save</button></div>'+
      '</div></div>';
    document.getElementById('mCancel').onclick=function(){host.innerHTML='';};
    document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')host.innerHTML='';});
    if(id)document.getElementById('mDel').onclick=function(){if(confirm('Delete the whole "'+m.name+'" area and its '+m.subs.length+' task(s)?')){MODULES=MODULES.filter(function(x){return x.id!==id;});saveModules();host.innerHTML='';renderSetup();renderToday();}};
    document.getElementById('mSave').onclick=function(){
      var name=document.getElementById('m-name').value.trim();if(!name){alert('Give the area a name.');return;}
      var emoji=document.getElementById('m-emoji').value, when=document.getElementById('m-when').value.trim();
      if(id){m.name=name;m.emoji=emoji;m.when=when;}
      else{MODULES.push({id:uid('m'),name:name,emoji:emoji,when:when,subs:[]});}
      saveModules();host.innerHTML='';renderSetup();renderToday();
    };
  }

  // ----- sub-task editor (instruction / photos / pay / needsPhoto) -----
  function openSubEditor(moduleId, subId){
    var m=MODULES.find(function(x){return x.id===moduleId;});if(!m)return;
    var s=subId?m.subs.find(function(x){return x.id===subId;}):{name:'',note:'',pay:1,needsPhoto:false,photos:[]};
    var host=document.getElementById('modalHost');
    host.innerHTML='<div class="modal" id="modal"><div class="sheet">'+
      '<h2>'+(subId?'Edit task':'New task')+'</h2>'+
      '<p class="sub">Inside <b>'+esc(m.name)+'</b></p>'+
      '<div class="fld"><label>What is it?</label><input id="s-name" value="'+esc(s.name||'')+'" placeholder="e.g. Collect eggs"></div>'+
      '<div class="fld"><label>Exactly how to do it</label><textarea id="s-note" placeholder="Every step, and WHY (e.g. don\'t leave the hose running — chlorine kills the fish)">'+esc(s.note||'')+'</textarea></div>'+
      '<div class="fld"><label>Pays ($)</label><input id="s-pay" type="number" step="0.25" value="'+(s.pay!=null?s.pay:'')+'" placeholder="1.00"></div>'+
      '<div class="fld"><label>Pictures (add a note under each — optional)</label>'+
      '<div class="photo-btns"><button type="button" class="pbtn" id="s-take">📷 Take a photo</button><button type="button" class="pbtn" id="s-lib">🖼️ From library</button></div>'+
      '<input id="s-photo-take" type="file" accept="image/*" capture="environment" hidden>'+
      '<input id="s-photo-lib" type="file" accept="image/*" multiple hidden></div>'+
      '<div id="s-strip" class="photo-strip"></div>'+
      '<label class="chk" style="margin:6px 0 16px"><input type="checkbox" id="s-needs"'+(s.needsPhoto?' checked':'')+'> Photo required to get paid</label>'+
      '<div class="sheet-actions">'+(subId?'<button class="btn-danger" id="sDel">Delete</button>':'')+'<button class="btn-ghost" id="sCancel">Cancel</button><button class="btn-primary" id="sSave">Save</button></div>'+
      '</div></div>';
    var photos=(s.photos&&s.photos.slice().map(function(p){return {img:pImg(p),cap:pCap(p)};}))||[];
    function drawStrip(){document.getElementById('s-strip').innerHTML=photos.map(function(p,i){return '<div class="pcard"><img class="zoom" src="'+p.img+'"><input class="pcap" data-i="'+i+'" placeholder="Note for this picture, e.g. Do NOT take these eggs" value="'+esc(p.cap)+'"><button type="button" class="prm" data-rm="'+i+'">×</button></div>';}).join('');}
    drawStrip();
    document.getElementById('s-strip').addEventListener('click',function(e){var z=e.target.closest('.zoom');if(z){openLightbox(z.getAttribute('src'));return;}var b=e.target.closest('[data-rm]');if(!b)return;photos.splice(+b.getAttribute('data-rm'),1);drawStrip();});
    document.getElementById('s-strip').addEventListener('input',function(e){var c=e.target.closest('.pcap');if(c){photos[+c.getAttribute('data-i')].cap=c.value;}});
    function addFiles(e){[].slice.call(e.target.files).forEach(function(f){resizeImage(f,function(d){photos.push({img:d,cap:''});drawStrip();});});e.target.value='';}
    document.getElementById('s-take').onclick=function(){document.getElementById('s-photo-take').click();};
    document.getElementById('s-lib').onclick=function(){document.getElementById('s-photo-lib').click();};
    document.getElementById('s-photo-take').addEventListener('change',addFiles);
    document.getElementById('s-photo-lib').addEventListener('change',addFiles);
    document.getElementById('sCancel').onclick=function(){host.innerHTML='';};
    document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')host.innerHTML='';});
    if(subId)document.getElementById('sDel').onclick=function(){if(confirm('Delete "'+s.name+'"?')){m.subs=m.subs.filter(function(x){return x.id!==subId;});saveModules();host.innerHTML='';renderSetup();renderToday();}};
    document.getElementById('sSave').onclick=function(){
      var name=document.getElementById('s-name').value.trim();if(!name){alert('Give the task a name.');return;}
      var obj={id:subId||uid('s'),name:name,note:document.getElementById('s-note').value.trim(),
        pay:parseFloat(document.getElementById('s-pay').value)||0,needsPhoto:document.getElementById('s-needs').checked,photos:photos};
      if(subId){var i=m.subs.findIndex(function(x){return x.id===subId;});m.subs[i]=obj;}else{m.subs.push(obj);}
      saveModules();host.innerHTML='';renderSetup();renderToday();
    };
  }

  // ================= tabs =================
  var tabs={'tab-today':['view-today',renderToday],'tab-dad':['view-dad',renderDad],'tab-setup':['view-setup',renderSetup]};
  Object.keys(tabs).forEach(function(tid){document.getElementById(tid).addEventListener('click',function(){
    Object.keys(tabs).forEach(function(k){document.getElementById(k).setAttribute('aria-selected',k===tid?'true':'false');document.getElementById(tabs[k][0]).hidden=(k!==tid);});
    tabs[tid][1]();document.querySelector('header').scrollIntoView({block:'start'});
  });});
  boot();
})();
</script>
